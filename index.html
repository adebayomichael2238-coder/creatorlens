<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>CreatorLens</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#08080e; --surface:#0f0f18; --card:#13131e; --card2:#181825;
  --border:#1e1e2e; --border-h:#7c3aed;
  --purple:#7c3aed; --pl:#a78bfa; --pdim:rgba(124,58,237,0.12); --pglow:rgba(124,58,237,0.22);
  --text:#e8e8f5; --muted:#6b6b90; --dim:#2a2a40;
  --green:#34d399; --yellow:#fbbf24; --red:#f87171; --blue:#60a5fa;
  --sidebar:220px; --bottomnav:64px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;overscroll-behavior:none;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px;}

/* ── Layout ── */
#app{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .25s;overflow:hidden;z-index:100;}
#sidebar.collapsed{width:56px;}
#main{flex:1;overflow-y:auto;position:relative;padding-bottom:0;}
#page{max-width:1080px;margin:0 auto;padding:28px 20px 40px;}

/* ── Bottom nav (mobile) ── */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottomnav);background:var(--surface);border-top:1px solid var(--border);z-index:200;align-items:center;justify-content:space-around;padding:0 4px;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:10px;transition:all .15s;flex:1;}
.bnav-item.active{color:var(--pl);}
.bnav-item svg{width:20px;height:20px;flex-shrink:0;}
.bnav-label{font-size:9px;font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap;}

/* ── Sidebar ── */
.logo{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;white-space:nowrap;overflow:hidden;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--purple);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 16px var(--pglow);}
.logo-icon svg{width:18px;height:18px;color:#fff;}
.logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;white-space:nowrap;}
.logo-text span{color:var(--pl);}
nav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;overflow-x:hidden;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:400;cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;border-left:2px solid transparent;transition:all .15s;width:100%;}
.nav-item:hover{background:var(--card);color:var(--text);}
.nav-item.active{background:var(--pdim);color:var(--pl);border-left-color:var(--purple);font-weight:500;}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.8;}
.nav-item.active svg{opacity:1;}
.nav-label{overflow:hidden;}
.collapse-btn{margin:8px 6px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:flex-end;gap:6px;transition:all .15s;white-space:nowrap;overflow:hidden;}
.collapse-btn:hover{border-color:var(--purple);color:var(--text);}
#sidebar.collapsed .collapse-btn{justify-content:center;}

/* ── Forms ── */
input,textarea,select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 13px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;width:100%;}
input:focus,textarea:focus{border-color:var(--purple);}
select{cursor:pointer;}
textarea{resize:none;line-height:1.6;}

/* ── Buttons ── */
.btn{border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .2s;font-size:13px;padding:10px 18px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-primary{background:var(--purple);color:#fff;box-shadow:0 0 16px var(--pglow);}
.btn-primary:hover{background:#6d28d9;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border-h);color:var(--text);}
.btn-danger{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-full{width:100%;justify-content:center;}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;}
.card-pad{padding:18px;}

/* ── Stat cards ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.stat-value{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;line-height:1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

/* ── Page header ── */
.page-header{margin-bottom:22px;}
.page-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:2px;}
.page-sub{color:var(--muted);font-size:12px;}

/* ── Tags ── */
.tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;border-radius:4px;padding:2px 7px;}

/* ── Video feed — vertical list ── */
.feed-list{display:flex;flex-direction:column;gap:12px;}
.feed-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border .2s,transform .15s;}
.feed-card:hover{border-color:var(--border-h);transform:translateY(-1px);}
.feed-card-inner{display:flex;gap:0;}
.feed-thumb-wrap{position:relative;width:160px;flex-shrink:0;cursor:pointer;}
.feed-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;min-height:90px;}
.feed-thumb-wrap .play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.feed-card:hover .play-overlay{opacity:1;}
.play-circle{width:36px;height:36px;border-radius:50%;background:rgba(124,58,237,.85);display:flex;align-items:center;justify-content:center;}
.play-circle svg{width:14px;height:14px;color:#fff;margin-left:2px;}
.feed-info{flex:1;padding:12px 14px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.feed-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.feed-meta{display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap;margin-bottom:10px;}
.feed-stat{display:flex;align-items:center;gap:4px;}
.feed-stat svg{width:11px;height:11px;}
.feed-actions{display:flex;gap:6px;align-items:center;}
.feed-channel-tag{font-size:10px;color:var(--pl);background:var(--pdim);border-radius:4px;padding:2px 6px;margin-left:auto;}

/* ── Shorts player ── */
#shorts-player{position:fixed;inset:0;background:#000;z-index:2000;display:none;flex-direction:column;}
#shorts-player.open{display:flex;}
.sp-topbar{position:absolute;top:0;left:0;right:0;z-index:10;padding:14px 16px;display:flex;align-items:center;gap:12px;background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);}
.sp-back{background:rgba(255,255,255,.15);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;backdrop-filter:blur(6px);flex-shrink:0;}
.sp-back svg{width:16px;height:16px;}
.sp-channel{flex:1;font-size:13px;font-weight:500;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sp-ai-btn{background:var(--purple);border:none;border-radius:20px;color:#fff;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:0 0 16px var(--pglow);}
.sp-container{flex:1;position:relative;overflow:hidden;}
.sp-slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.sp-slide iframe{width:100%;height:100%;border:none;}
.sp-side{position:absolute;right:14px;bottom:130px;display:flex;flex-direction:column;gap:16px;align-items:center;z-index:10;}
.sp-action{display:flex;flex-direction:column;align-items:center;gap:3px;}
.sp-action-btn{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.sp-action-btn svg{width:18px;height:18px;}
.sp-action-btn:hover,.sp-action-btn.saved{background:rgba(124,58,237,.6);}
.sp-action-label{font-size:9px;color:rgba(255,255,255,.7);}
.sp-bottom{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:14px 16px 24px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);}
.sp-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:5px;line-height:1.4;}
.sp-stats{font-size:12px;color:rgba(255,255,255,.6);}
.sp-nav{display:flex;justify-content:center;gap:10px;margin-top:12px;}
.sp-nav-btn{background:rgba(255,255,255,.15);border:none;border-radius:20px;color:#fff;font-size:12px;padding:7px 18px;cursor:pointer;backdrop-filter:blur(6px);display:flex;align-items:center;gap:5px;}
.sp-nav-btn svg{width:14px;height:14px;}
.sp-nav-btn:disabled{opacity:.3;}
.sp-progress{position:absolute;bottom:0;left:0;height:2px;background:var(--purple);transition:width .3s;}
#sp-ai-panel{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:18px;z-index:20;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:70vh;overflow-y:auto;}
#sp-ai-panel.open{transform:translateY(0);}
.ai-handle{width:32px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.ai-panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.ai-panel-result{font-size:13px;line-height:1.75;white-space:pre-wrap;}

/* ── Analyser modal ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;}
#modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:960px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;}
.modal-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.modal-title{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modal-stats{display:flex;gap:10px;font-size:11px;color:var(--muted);flex-shrink:0;}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.modal-body{display:flex;flex:1;overflow:hidden;}
.modal-left{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.modal-right{width:300px;border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.modal-ai-hdr{padding:13px 14px;border-bottom:1px solid var(--border);}
.modal-ai-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.modal-ai-btns{display:flex;flex-direction:column;gap:6px;}
.modal-ai-result{flex:1;padding:14px;overflow-y:auto;font-size:13px;line-height:1.75;white-space:pre-wrap;}
.modal-ai-empty{color:var(--muted);font-size:13px;text-align:center;margin-top:32px;padding:0 14px;}

/* ── Comp rows ── */
.comp-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px;transition:border .2s;}
.comp-row:hover{border-color:rgba(124,58,237,.3);}
.comp-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
.comp-info{flex:1;min-width:0;}
.comp-name{font-size:13px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.comp-handle{font-size:11px;color:var(--muted);margin-bottom:5px;}
.comp-stats{display:flex;gap:12px;font-size:11px;color:var(--muted);flex-wrap:wrap;}

/* ── Charts ── */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
.chart-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:14px;}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}

/* ── Channel header ── */
.ch-header{background:linear-gradient(135deg,var(--card),rgba(124,58,237,.08));border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:22px;display:flex;gap:16px;align-items:center;}
.ch-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid var(--purple);flex-shrink:0;box-shadow:0 0 20px var(--pglow);}
.ch-avatar-placeholder{width:64px;height:64px;border-radius:50%;background:var(--pdim);display:flex;align-items:center;justify-content:center;border:3px solid var(--purple);flex-shrink:0;}
.ch-avatar-placeholder svg{width:28px;height:28px;color:var(--pl);}
.ch-meta{flex:1;min-width:0;}
.ch-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px;}
.ch-handle{font-size:12px;color:var(--muted);margin-bottom:8px;}
.ch-quick-stats{display:flex;gap:16px;flex-wrap:wrap;}
.ch-qs{font-size:12px;color:var(--muted);}
.ch-qs strong{color:var(--text);font-weight:600;}

/* ── Perf table ── */
.perf-table{width:100%;border-collapse:collapse;}
.perf-table th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
.perf-table td{padding:9px 10px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.perf-table tr:last-child td{border-bottom:none;}
.perf-table tr:hover td{background:var(--card2);}
.perf-thumb{width:52px;height:30px;object-fit:cover;border-radius:4px;}
.rank-badge{width:20px;height:20px;border-radius:50%;background:var(--pdim);color:var(--pl);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ── Niche finder ── */
.niche-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;transition:border .2s;}
.niche-card:hover{border-color:rgba(124,58,237,.3);}
.niche-score-bar{height:8px;border-radius:4px;background:var(--border);margin:10px 0 6px;overflow:hidden;}
.niche-score-fill{height:100%;border-radius:4px;transition:width 1s ease;}
.pushed-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;transition:border .2s;}
.pushed-card:hover{border-color:rgba(124,58,237,.3);}
.pushed-avatar{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
.pushed-info{flex:1;min-width:0;}
.pushed-name{font-size:13px;font-weight:600;margin-bottom:3px;}
.pushed-stats{display:flex;gap:10px;font-size:11px;color:var(--muted);flex-wrap:wrap;margin-bottom:8px;}
.pushed-video{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;gap:8px;align-items:center;cursor:pointer;transition:border .15s;}
.pushed-video:hover{border-color:var(--border-h);}
.pushed-vid-thumb{width:52px;height:30px;object-fit:cover;border-radius:4px;flex-shrink:0;}
.pushed-vid-title{font-size:11px;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4;}
.fire-badge{font-size:10px;background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.25);border-radius:4px;padding:1px 6px;font-weight:600;}
.hot-badge{font-size:10px;background:rgba(251,191,36,.15);color:var(--yellow);border:1px solid rgba(251,191,36,.25);border-radius:4px;padding:1px 6px;font-weight:600;}

/* ── Misc ── */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:5px;}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease forwards;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--pl);animation:pulse 2s infinite;flex-shrink:0;}
.error-msg{font-size:12px;color:var(--red);margin-top:6px;}
.empty-state{text-align:center;color:var(--muted);font-size:13px;padding:50px 20px;}
.empty-link{color:var(--pl);cursor:pointer;}
.row{display:flex;align-items:center;gap:10px;}
.row-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.col{display:flex;flex-direction:column;gap:8px;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;}
.insight-block{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.insight-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.insight-label{font-size:10px;color:var(--pl);text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
.notif-panel{display:flex;flex-direction:column;gap:8px;margin-bottom:22px;}
.notif-item{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;}
.notif-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.notif-text{font-size:13px;}
.notif-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.tab-bar{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:18px;}
.tab-btn{flex:1;padding:7px;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;background:transparent;color:var(--muted);}
.tab-btn.active{background:var(--purple);color:#fff;}
.target-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.target-info{flex:1;}
.target-label{font-size:13px;font-weight:500;margin-bottom:5px;}
.target-bar-bg{background:var(--border);border-radius:4px;height:6px;}
.target-bar{height:6px;border-radius:4px;background:var(--purple);transition:width .4s;}
.target-progress{font-size:11px;color:var(--muted);margin-top:4px;}
.swipe-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:border .2s;}
.swipe-card:hover{border-color:rgba(124,58,237,.4);}
.idea-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:border .2s;}
.idea-card:hover{border-color:rgba(124,58,237,.4);}
.idea-num{width:24px;height:24px;border-radius:7px;background:var(--pdim);color:var(--pl);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ch-banner{background:linear-gradient(135deg,var(--card),rgba(124,58,237,.08));border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:22px;}

/* ── Mobile ── */
@media(max-width:768px){
  #sidebar{display:none;}
  #bottom-nav{display:flex;}
  #main{padding-bottom:var(--bottomnav);}
  #page{padding:20px 14px 80px;}
  .modal-right{display:none;}
  .modal-left{padding:14px;}
  .charts-grid{grid-template-columns:1fr;}
  .feed-thumb-wrap{width:120px;}
  .ch-header{flex-direction:column;text-align:center;}
  .ch-quick-stats{justify-content:center;}
  .perf-table th:nth-child(2),.perf-table td:nth-child(2){display:none;}
}
@media(min-width:769px){

// ─── Utils ────────────────────────────────────────────────────────────────────
const fmtN = n=>{n=parseInt(n)||0;if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString();};
const ago = d=>{const diff=Date.now()-new Date(d);const days=Math.floor(diff/86400000);if(days===0)return'Today';if(days===1)return'Yesterday';if(days<30)return days+'d ago';if(days<365)return Math.floor(days/30)+'mo ago';return Math.floor(days/365)+'y ago';};
const tag=(text,color='#7c3aed')=>`<span class="tag" style="background:${color}22;color:${color};border:1px solid ${color}44">${text}</span>`;
const skel=(n=4)=>Array(n).fill(0).map(()=>`<div style="background:var(--card);border-radius:12px;overflow:hidden;"><div class="skeleton" style="aspect-ratio:16/9;"></div><div style="padding:12px;display:flex;flex-direction:column;gap:7px;"><div class="skeleton" style="height:13px;width:85%;"></div><div class="skeleton" style="height:11px;width:55%;"></div></div></div>`).join('');

async function ytF(path){
  const r=await fetch(`https://www.googleapis.com/youtube/v3/${path}&key=${YT_KEY}`);
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'YouTube API error');}
  return r.json();
}
async function clF(prompt,sys=''){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys||'You are a YouTube Shorts content strategist. Be concise, specific, actionable.',messages:[{role:'user',content:prompt}]})});
  const d=await r.json();return d.content?.[0]?.text||'No response';
}

// ─── Init ─────────────────────────────────────────────────────────────────────
window.onload = async()=>{
  renderNav(); renderBottomNav();

        <div><div class="stat-label">VIDEOS</div><div style="font-family:'Syne';font-size:20px;font-weight:700;">${fmtN(myStats.videoCount)}</div></div>

function renderCompetitors(){

    <div class="card card-pad" style="margin-bottom:18px;">

      <div id="comp-err" class="error-msg" style="display:none;"></div>
    </div>
    <div id="comp-list">${renderCompList()}</div>`;
}
function renderCompList(){
  if(!S.competitors.length)return`<div class="empty-state">No competitors added yet.</div>`;
  return`<div class="col" style="gap:10px;">${S.competitors.map(c=>`
    <div class="comp-row fade-up">
      <img class="comp-avatar" src="${c.thumbnail}" onerror="this.style.display='none'">
      <div class="comp-info">
        <div class="comp-name">${c.title}</div>
        <div class="comp-handle">${c.handle}</div>
        <div class="comp-stats"><span>👥 ${fmtN(c.subscriberCount)}</span><span>🎬 ${fmtN(c.videoCount)}</span><span>👁 ${fmtN(c.viewCount)}</span></div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="removeComp('${c.id}')">Remove</button>
    </div>`).join('')}</div>`;
}
async function addComp(){
  const inp=document.getElementById('comp-in'),err=document.getElementById('comp-err'),btn=document.getElementById('add-comp-btn');
  const h=inp.value.trim();if(!h)return;
  btn.disabled=true;btn.textContent='Adding...';err.style.display='none';
  try{
    const data=await ytF(`channels?part=snippet,statistics&forHandle=${h.replace('@','')}`);
    if(!data.items?.length)throw new Error('Channel not found.');
    const ch=data.items[0];
    const c={id:ch.id,title:ch.snippet.title,handle:'@'+h.replace('@',''),thumbnail:ch.snippet.thumbnails?.medium?.url||ch.snippet.thumbnails?.default?.url||'',subscriberCount:ch.statistics.subscriberCount,videoCount:ch.statistics.videoCount,viewCount:ch.statistics.viewCount};
    if(!S.competitors.find(x=>x.id===c.id)){S.competitors.push(c);persist();}
    inp.value='';document.getElementById('comp-list').innerHTML=renderCompList();
  }catch(e){err.textContent=e.message;err.style.display='block';}
  btn.disabled=false;btn.textContent='Add';
}
function removeComp(id){S.competitors=S.competitors.filter(c=>c.id!==id);persist();document.getElementById('comp-list').innerHTML=renderCompList();}

function renderFeed(){

        <button class="btn btn-primary btn-sm" onclick="loadFeed()">Load</button>
      </div>
    </div>
    <div id="feed-out">${!S.competitors.length?`<div class="empty-state">Add competitors first.</div>`:`<div style="display:flex;flex-direction:column;gap:12px;">${Array(5).fill(0).map(()=>`<div class="skeleton" style="height:100px;border-radius:14px;"></div>`).join('')}</div>`}</div>`;
  if(S.competitors.length)loadFeed();
}
async function loadFeed(){
  const chId=document.getElementById('feed-ch')?.value||'all';
  const sort=document.getElementById('feed-sort')?.value||'date';
  const out=document.getElementById('feed-out');if(!out)return;
  out.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px;">${Array(5).fill(0).map(()=>`<div class="skeleton" style="height:100px;border-radius:14px;"></div>`).join('')}</div>`;
  try{
    const chs=chId==='all'?S.competitors:S.competitors.filter(c=>c.id===chId);
    feedVids=[];
    for(const ch of chs){
      const d=await ytF(`search?part=snippet&channelId=${ch.id}&type=video&order=${sort}&maxResults=20`);
      const ids=d.items?.map(v=>v.id.videoId).filter(Boolean).join(',');

      feedVids.push(...(det.items||[]));

let spIdx=0,spVids=[],spAIOpen=false;

function closeSP(){document.getElementById('shorts-player').classList.remove('open');document.body.style.overflow='';['sp-prev','sp-curr','sp-next'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML='';});}
function spRender(){
  const v=spVids[spIdx];if(!v)return;
  const vid=v.id?.videoId||v.id;
  document.getElementById('sp-channel').textContent=v.snippet?.channelTitle||'';
  document.getElementById('sp-title').textContent=v.snippet?.title||'';
  document.getElementById('sp-stats').textContent=`👁 ${fmtN(v.statistics?.viewCount)}  ·  👍 ${fmtN(v.statistics?.likeCount)}`;
  document.getElementById('sp-counter').textContent=`${spIdx+1} / ${spVids.length}`;
  document.getElementById('sp-prev-btn').disabled=spIdx===0;
  document.getElementById('sp-next-btn').disabled=spIdx===spVids.length-1;
  document.getElementById('sp-progress').style.width=`${((spIdx+1)/spVids.length)*100}%`;
  const saved=S.watchlist.some(w=>(w.id?.videoId||w.id)===vid);
  const sb=document.getElementById('sp-save-btn');
  sb.classList.toggle('saved',saved);
  document.getElementById('sp-curr').innerHTML=`<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1" style="width:100%;height:100%;border:none;" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  const prev=document.getElementById('sp-prev');prev.style.transform='translateY(-100%)';
  if(spIdx>0){const pv=spVids[spIdx-1];const pvid=pv.id?.videoId||pv.id;prev.innerHTML=`<iframe src="https://www.youtube.com/embed/${pvid}?autoplay=0" style="width:100%;height:100%;border:none;" allow="autoplay;encrypted-media"></iframe>`;}else prev.innerHTML='';
  const next=document.getElementById('sp-next');next.style.transform='translateY(100%)';
  if(spIdx<spVids.length-1){const nv=spVids[spIdx+1];const nvid=nv.id?.videoId||nv.id;next.innerHTML=`<iframe src="https://www.youtube.com/embed/${nvid}?autoplay=0" style="width:100%;height:100%;border:none;" allow="autoplay;encrypted-media"></iframe>`;}else next.innerHTML='';

}
function spNav(dir){
  const ni=spIdx+dir;if(ni<0||ni>=spVids.length)return;
  const curr=document.getElementById('sp-curr'),prev=document.getElementById('sp-prev'),next=document.getElementById('sp-next');
  if(dir===1){curr.style.transition='transform .35s cubic-bezier(.4,0,.2,1)';next.style.transition='transform .35s cubic-bezier(.4,0,.2,1)';curr.style.transform='translateY(-100%)';next.style.transform='translateY(0)';}
  else{curr.style.transition='transform .35s cubic-bezier(.4,0,.2,1)';prev.style.transition='transform .35s cubic-bezier(.4,0,.2,1)';curr.style.transform='translateY(100%)';prev.style.transform='translateY(0)';}

async function runAutoScan(){
  const btn=document.getElementById('auto-scan-btn'),out=document.getElementById('niche-results');
  btn.disabled=true;btn.textContent='Scanning niches...';
  out.innerHTML=`<div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:14px;">Scanning ${NICHE_CLUSTERS.length} niche clusters...</div><div class="col" style="gap:10px;">${Array(5).fill(0).map(()=>`<div class="skeleton" style="height:120px;border-radius:14px;"></div>`).join('')}</div>`;

  const after=new Date(Date.now()-14*86400000).toISOString();
  const results=[];

  try{
    for(const cluster of NICHE_CLUSTERS){
      const kw=cluster.keywords[0];
      try{
        const data=await ytF(`search?part=snippet&q=${encodeURIComponent(kw)}&type=video&videoDuration=short&order=viewCount&publishedAfter=${after}&maxResults=15`);
        const items=data.items||[];
        if(!items.length)continue;
        const ids=items.map(v=>v.id.videoId).filter(Boolean).join(',');
        const chIds=[...new Set(items.map(v=>v.snippet?.channelId).filter(Boolean))].slice(0,10).join(',');
        const[vDet,cDet]=await Promise.all([ytF(`videos?part=statistics,snippet&id=${ids}`),ytF(`channels?part=statistics,snippet&id=${chIds}`)]);
        const vids=vDet.items||[],chs=cDet.items||[];
        const chMap={};chs.forEach(c=>{chMap[c.id]=c;});

        // Score: focus on faceless signals
        const facelessChs=chs.filter(c=>{
          const subs=parseInt(c.statistics?.subscriberCount||0);
          const vCount=parseInt(c.statistics?.videoCount||0);
          return subs<20000&&vCount>=3;
        });

        const avgViews=vids.reduce((a,v)=>a+parseInt(v.statistics?.viewCount||0),0)/Math.max(1,vids.length);
        const avgSubs=chs.reduce((a,c)=>a+parseInt(c.statistics?.subscriberCount||0),0)/Math.max(1,chs.length);
        const ratio=avgViews/Math.max(1,avgSubs);

        let sat,satColor,satLabel;
        if(ratio>15){sat=10;satColor='var(--green)';satLabel='🟢 Early Opportunity';}
        else if(ratio>5){sat=40;satColor='var(--green)';satLabel='🟢 Growing Fast';}
        else if(ratio>2){sat=65;satColor='var(--yellow)';satLabel='🟡 Competitive';}
        else{sat=88;satColor='var(--red)';satLabel='🔴 Saturated';}

        const topVid=vids.sort((a,b)=>parseInt(b.statistics?.viewCount||0)-parseInt(a.statistics?.viewCount||0))[0];
        const topCh=topVid?chMap[topVid.snippet?.channelId]:null;

        results.push({cluster,avgViews,avgSubs,ratio,sat,satColor,satLabel,facelessCount:facelessChs.length,topVid,topCh,vids,chMap});
      }catch(e){continue;}
    }

    // Sort by opportunity (lower sat = better)
    results.sort((a,b)=>a.sat-b.sat);

    if(!results.length){out.innerHTML=`<div class="empty-state">No results found. Try again.</div>`;btn.disabled=false;btn.textContent='🔍 Auto-Discover Niches';return;}

          <span>👁 ${fmtN(Math.round(r.avgViews))} avg views</span>
          <span>📊 ${r.ratio.toFixed(1)}x views/subs ratio</span>
          <span>👤 ${r.facelessCount} faceless channels active</span>
          <span>📈 ${fmtN(Math.round(r.avgSubs))} avg channel size</span>
        </div>

        <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;gap:10px;align-items:center;cursor:pointer;margin-bottom:10px;" onclick="openMod('${r.topVid.id?.videoId||r.topVid.id}','${(r.topVid.snippet?.title||'').replace(/'/g,"\\'")}','${fmtN(r.topVid.statistics?.viewCount)}','${fmtN(r.topVid.statistics?.likeCount)}')">
          <img src="${r.topVid.snippet?.thumbnails?.medium?.url||''}" style="width:64px;height:36px;object-fit:cover;border-radius:5px;flex-shrink:0;">
          <div style="flex:1;min-width:0;">

          <button class="btn btn-primary btn-sm" style="flex-shrink:0;">Analyse</button>
        </div>`:''}
        ${r.topCh?`

        <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;gap:10px;align-items:center;">

          </div>

      </div>`).join('')}</div>`;

    // AI summary
    const topNiches=results.slice(0,3).map(r=>`${r.cluster.label}: ${r.satLabel}, avg ${fmtN(Math.round(r.avgViews))} views, ratio ${r.ratio.toFixed(1)}x`).join('\n');

          const chAvatar=ch?.snippet?.thumbnails?.default?.url||'';
          const views=parseInt(v.statistics?.viewCount||0);
          const chSubs=parseInt(ch?.statistics?.subscriberCount||1);
          const r=(views/chSubs).toFixed(1);
          const hot=parseFloat(r)>5;
          return`<div class="niche-card" style="cursor:pointer;" onclick="openMod('${vid}','${(v.snippet?.title||'').replace(/'/g,"\\'")}','${fmtN(v.statistics?.viewCount)}','${fmtN(v.statistics?.likeCount)}')">
            <div style="display:flex;gap:10px;align-items:flex-start;">
              <img src="${v.snippet?.thumbnails?.medium?.url||''}" style="width:80px;height:45px;object-fit:cover;border-radius:6px;flex-shrink:0;">
              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-weight:500;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${v.snippet?.title||''}</div>
                <div style="display:flex;gap:8px;font-size:11px;color:var(--muted);flex-wrap:wrap;">
                  <span>👁 ${fmtN(v.statistics?.viewCount)}</span><span>👥 ${subs} subs</span>
                  <span style="color:${hot?'var(--green)':'var(--muted)'}">📈 ${r}x${hot?' 🔥':''}</span>
                </div>
                ${ch?`<div style="display:flex;align-items:center;gap:6px;margin-top:6px;padding:5px 8px;background:var(--card2);border-radius:7px;">
                  ${chAvatar?`<img src="${chAvatar}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;">`:''}
                  <span style="font-size:11px;">${ch.snippet?.title||''}</span>
                  <span style="font-size:10px;color:var(--muted);margin-left:auto;">🎬 ${fmtN(ch.statistics?.videoCount)} videos</span>
                </div>`:''}
              </div>
              <button class="btn btn-primary btn-sm" style="flex-shrink:0;">Analyse</button>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:14px;"><button class="btn btn-primary" onclick="nicheToIdeas('${kw.replace(/'/g,"\\'")}')">💡 Generate Ideas from This Niche</button></div>`;

    aiP.then(res=>{const el=document.getElementById('manual-ai');if(el)el.innerHTML=`<div class="insight-meta"><div class="pulse-dot"></div><div class="insight-label">AI Niche Analysis</div></div><div style="font-size:13px;line-height:1.8;white-space:pre-wrap;">${res}</div>`;}).catch(()=>{});
  }catch(e){out.innerHTML=`<div class="empty-state" style="color:var(--red)">${e.message}</div>`;}
  btn.disabled=false;btn.textContent='Scan';
}

async function loadPushed(){
  const btn=document.getElementById('pushed-btn'),out=document.getElementById('pushed-out');
  if(!btn||!out)return;
  btn.disabled=true;btn.textContent='Loading...';
  out.innerHTML=`<div class="col" style="gap:10px;">${Array(4).fill(0).map(()=>`<div class="skeleton" style="height:110px;border-radius:12px;"></div>`).join('')}</div>`;
  try{
    const after=new Date(Date.now()-10*86400000).toISOString();
    // Faceless-optimised keywords
    const kws=['motivational shorts','facts shorts','satisfying shorts','pov story shorts','dark humor shorts'];
    let allVids=[];
    for(const kw of kws){
      try{
        const d=await ytF(`search?part=snippet&q=${encodeURIComponent(kw)}&type=video&videoDuration=short&order=viewCount&publishedAfter=${after}&maxResults=8`);
        allVids.push(...(d.items||[]));
      }catch(e){continue;}
    }
    const seenCh=new Set();
    const uniq=allVids.filter(v=>{const cid=v.snippet?.channelId;if(seenCh.has(cid))return false;seenCh.add(cid);return true;});
    const chIds=uniq.map(v=>v.snippet?.channelId).filter(Boolean).slice(0,20).join(',');
    const vidIds=uniq.map(v=>v.id?.videoId).filter(Boolean).slice(0,20).join(',');
    const[cDet,vDet]=await Promise.all([ytF(`channels?part=statistics,snippet&id=${chIds}`),ytF(`videos?part=statistics,snippet&id=${vidIds}`)]);
    const chs=cDet.items||[],vids=vDet.items||[];
    const vidMap={};vids.forEach(v=>vidMap[v.id]=v);

    const pushed=chs.map(ch=>{
      const uv=uniq.find(v=>v.snippet?.channelId===ch.id);
      const vid=uv?vidMap[uv.id?.videoId]:null;
      const subs=parseInt(ch.statistics?.subscriberCount||0);
      const views=parseInt(vid?.statistics?.viewCount||0);
      const vCount=parseInt(ch.statistics?.videoCount||0);
      const ratio=subs>0?views/subs:0;
      return{ch,vid,subs,views,ratio,vCount};
    })
    .filter(x=>x.subs<20000&&x.views>30000&&x.ratio>3&&x.vCount>=3)
    .sort((a,b)=>b.ratio-a.ratio)
    .slice(0,10);

    if(!pushed.length){out.innerHTML=`<div class="empty-state">No strongly pushed faceless channels detected right now. Try again later.</div>`;btn.disabled=false;btn.textContent='↻ Refresh';return;}

    out.innerHTML=`<div class="col" style="gap:10px;">${pushed.map(({ch,vid,subs,views,ratio,vCount})=>{
      const avatar=ch.snippet?.thumbnails?.medium?.url||ch.snippet?.thumbnails?.default?.url||'';
      const vidThumb=vid?.snippet?.thumbnails?.medium?.url||'';
      const vidId=vid?.id||'';
      const vidTitle=vid?.snippet?.title||'';
      const isFire=ratio>20,isHot=ratio>8;
      return`<div class="pushed-card fade-up">
        <img class="pushed-avatar" src="${avatar}" onerror="this.style.display='none'">
        <div class="pushed-info">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap;">
            <div class="pushed-name">${ch.snippet?.title||'Unknown'}</div>
            ${isFire?`<span class="fire-badge">🔥 ON FIRE</span>`:isHot?`<span class="hot-badge">⚡ HOT</span>`:''}
          </div>
          <div class="pushed-stats">
            <span>👥 ${fmtN(subs)} subs</span>
            <span>👁 ${fmtN(views)} views</span>
            <span>🎬 ${fmtN(vCount)} videos</span>
            <span style="color:${isFire?'var(--red)':isHot?'var(--yellow)':'var(--muted)'}">📈 ${ratio.toFixed(1)}x ratio</span>
          </div>
          ${vidTitle?`<div class="pushed-video" onclick="openMod('${vidId}','${vidTitle.replace(/'/g,"\\'")}','${fmtN(views)}','?')">
            ${vidThumb?`<img class="pushed-vid-thumb" src="${vidThumb}">`:''}
            <div class="pushed-vid-title">${vidTitle}</div>
            <span style="font-size:11px;color:var(--pl);flex-shrink:0;">Analyse →</span>
          </div>`:''}
        </div>
      </div>`;
    }).join('')}`;
  }catch(e){out.innerHTML=`<div class="empty-state" style="color:var(--red)">${e.message}</div>`;}
  btn.disabled=false;btn.textContent='↻ Refresh';
}

function nicheToIdeas(kw){navigate('ideas');setTimeout(()=>{const inp=document.getElementById('idea-topic');if(inp){inp.value=kw;genIdeas();}},300);}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openMod(vid,title,views,likes){
  S.currentVideo={videoId:vid,title:decodeURIComponent((title||'').replace(/&#39;/g,"'").replace(/&quot;/g,'"')),views,likes};
  document.getElementById('mod-title').textContent=S.currentVideo.title;
  document.getElementById('mod-stats').innerHTML=`<span>👁 ${views}</span><span>👍 ${likes}</span>`;
  document.getElementById('mod-iframe').src=`https://www.youtube.com/embed/${vid}?autoplay=1`;
  document.getElementById('mod-note').value='';
  document.getElementById('mod-ai').innerHTML=`<div class="modal-ai-empty">Run an analysis to get AI insights</div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeMod(e){if(e&&e.target!==document.getElementById('modal-overlay'))return;document.getElementById('modal-overlay').classList.remove('open');document.getElementById('mod-iframe').src='';S.currentVideo=null;}
async function runAI(type){
  if(!S.currentVideo)return;
  const{title,views,likes}=S.currentVideo;
  const r=document.getElementById('mod-ai');
  const btns=document.querySelectorAll('.modal-ai-btns .btn');
  btns.forEach(b=>b.disabled=true);
  r.innerHTML=`<div class="col" style="gap:5px;">${[85,60,90,50,75].map(w=>`<div class="skeleton" style="height:12px;width:${w}%;"></div>`).join('')}</div>`;
  try{
    let p='';
    if(type==='steal')p=`Analyse:\nTitle:"${title}" Views:${views} Likes:${likes}\n1.Hook Template — exact structure\n2.Story Structure beat by beat\n3.Rewrite for Matterverse (Salish/Jordan Matter, teens 12-17)\n4.Why it works`;
    if(type==='hook')p=`Score hook 1-10, suggest 2 improvements.\nTitle:"${title}" Views:${views}`;
    if(type==='format')p=`Identify format, why it works, how to replicate.\nTitle:"${title}" Views:${views}`;
    if(type==='ideas')p=`Generate 5 ideas for Matterverse (Salish/Jordan Matter, teens 12-17) inspired by:\nTitle:"${title}" Views:${views}`;
    const res=await clF(p);
    r.innerHTML=`<div class="fade-up" style="white-space:pre-wrap;">${res}</div>`;
  }catch(e){r.innerHTML=`<div style="color:var(--red);font-size:12px;">${e.message}</div>`;}
  btns.forEach(b=>b.disabled=false);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('mod-iframe').src='';
    if(document.getElementById('shorts-player').classList.contains('open'))closeSP();
  }
});
</script>
