<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>CreatorLens</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#08080e; --surface:#0f0f18; --card:#13131e; --card2:#181825;
  --border:#1e1e2e; --border-h:#7c3aed;
  --purple:#7c3aed; --pl:#a78bfa; --pdim:rgba(124,58,237,0.12); --pglow:rgba(124,58,237,0.22);
  --text:#e8e8f5; --muted:#6b6b90; --dim:#2a2a40;
  --green:#34d399; --yellow:#fbbf24; --red:#f87171; --blue:#60a5fa;
  --bottomnav:64px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;overscroll-behavior:none;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px;}

#app{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .25s;overflow:hidden;z-index:100;}
#sidebar.collapsed{width:56px;}
#main{flex:1;overflow-y:auto;position:relative;}
#page{max-width:1080px;margin:0 auto;padding:28px 20px 40px;}

#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottomnav);background:var(--surface);border-top:1px solid var(--border);z-index:200;align-items:center;justify-content:space-around;padding:0 4px;}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 6px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:10px;transition:all .15s;flex:1;}
.bnav-item.active{color:var(--pl);}
.bnav-item svg{width:20px;height:20px;}
.bnav-label{font-size:9px;font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap;}

.logo{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;white-space:nowrap;overflow:hidden;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--purple);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 16px var(--pglow);}
.logo-icon svg{width:17px;height:17px;color:#fff;}
.logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
.logo-text span{color:var(--pl);}
nav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;overflow-x:hidden;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;border-left:2px solid transparent;transition:all .15s;width:100%;}
.nav-item:hover{background:var(--card);color:var(--text);}
.nav-item.active{background:var(--pdim);color:var(--pl);border-left-color:var(--purple);font-weight:500;}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.75;}
.nav-item.active svg{opacity:1;}
.collapse-btn{margin:8px 6px;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:flex-end;gap:6px;transition:all .15s;white-space:nowrap;overflow:hidden;}
.collapse-btn:hover{border-color:var(--purple);}
#sidebar.collapsed .collapse-btn{justify-content:center;}

input,textarea,select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 13px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;width:100%;}
input:focus,textarea:focus{border-color:var(--purple);}
select{cursor:pointer;}
textarea{resize:none;line-height:1.6;}

.btn{border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .2s;font-size:13px;padding:10px 18px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-primary{background:var(--purple);color:#fff;box-shadow:0 0 14px var(--pglow);}
.btn-primary:hover{background:#6d28d9;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--border-h);color:var(--text);}
.btn-danger{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-full{width:100%;justify-content:center;}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;}
.card-pad{padding:18px;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.stat-value{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;line-height:1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

.page-header{margin-bottom:20px;}
.page-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:2px;}
.page-sub{color:var(--muted);font-size:12px;}

.tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;border-radius:4px;padding:2px 7px;}

/* ── Feed (vertical list) ── */
.feed-list{display:flex;flex-direction:column;gap:10px;}
.feed-card{background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden;transition:border .2s;}
.feed-card:hover{border-color:var(--border-h);}
.feed-inner{display:flex;min-height:88px;}
.feed-thumb{position:relative;width:136px;flex-shrink:0;cursor:pointer;background:#000;}
.feed-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .2s;}
.feed-thumb:hover img{opacity:.8;}
.feed-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.feed-thumb:hover .feed-play{opacity:1;}
.feed-play-circle{width:34px;height:34px;border-radius:50%;background:rgba(124,58,237,.85);display:flex;align-items:center;justify-content:center;}
.feed-play-circle svg{width:13px;height:13px;color:#fff;margin-left:2px;}
.feed-date-badge{position:absolute;bottom:5px;left:6px;font-size:10px;color:rgba(255,255,255,.8);background:rgba(0,0,0,.55);border-radius:3px;padding:1px 5px;}
.feed-info{flex:1;padding:11px 13px;display:flex;flex-direction:column;justify-content:space-between;min-width:0;}
.feed-title{font-size:12.5px;font-weight:500;line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.feed-meta{display:flex;gap:10px;font-size:11px;color:var(--muted);flex-wrap:wrap;margin-bottom:8px;align-items:center;}
.feed-meta-item{display:flex;align-items:center;gap:3px;}
.feed-meta-item svg{width:10px;height:10px;}
.feed-ch-pill{font-size:10px;color:var(--pl);background:var(--pdim);border-radius:4px;padding:2px 6px;margin-left:auto;}
.feed-actions{display:flex;gap:6px;align-items:center;}

/* ── Shorts Player ── */
#sp{position:fixed;inset:0;background:#000;z-index:2000;display:none;flex-direction:column;}
#sp.open{display:flex;}
.sp-top{position:absolute;top:0;left:0;right:0;z-index:10;padding:14px 16px;display:flex;align-items:center;gap:12px;background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);}
.sp-back{background:rgba(255,255,255,.15);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;backdrop-filter:blur(6px);flex-shrink:0;}
.sp-back svg{width:16px;height:16px;}
.sp-ch{flex:1;font-size:13px;font-weight:500;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sp-ai-btn{background:var(--purple);border:none;border-radius:20px;color:#fff;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;display:flex;align-items:center;gap:5px;}

/* Fixed: each slide is absolute, swap content not position */
.sp-body{flex:1;position:relative;overflow:hidden;}
.sp-frame{position:absolute;inset:0;background:#000;}
.sp-frame iframe{width:100%;height:100%;border:none;display:block;}
.sp-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:5;}
.sp-loading-ring{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.sp-side{position:absolute;right:14px;bottom:120px;display:flex;flex-direction:column;gap:16px;align-items:center;z-index:10;}
.sp-act{display:flex;flex-direction:column;align-items:center;gap:3px;}
.sp-act-btn{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.sp-act-btn svg{width:18px;height:18px;}
.sp-act-btn.on{background:rgba(124,58,237,.6);}
.sp-act-lbl{font-size:9px;color:rgba(255,255,255,.65);}

.sp-bot{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:14px 16px 22px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);}
.sp-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:4px;line-height:1.4;}
.sp-stats{font-size:11px;color:rgba(255,255,255,.55);}
.sp-nav{display:flex;justify-content:center;gap:10px;margin-top:12px;}
.sp-nav-btn{background:rgba(255,255,255,.15);border:none;border-radius:20px;color:#fff;font-size:12px;padding:7px 18px;cursor:pointer;backdrop-filter:blur(6px);display:flex;align-items:center;gap:5px;}
.sp-nav-btn svg{width:13px;height:13px;}
.sp-nav-btn:disabled{opacity:.3;}
.sp-prog{position:absolute;bottom:0;left:0;height:2px;background:var(--purple);transition:width .3s;}
.sp-counter{font-size:11px;color:rgba(255,255,255,.4);align-self:center;}

#sp-ai-panel{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:18px;z-index:20;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:70vh;overflow-y:auto;}
#sp-ai-panel.open{transform:translateY(0);}
.ai-handle{width:32px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.ai-result{font-size:13px;line-height:1.75;white-space:pre-wrap;}

/* ── Modal ── */
#mod-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;}
#mod-ov.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:960px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;}
.mod-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.mod-title{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mod-stats{display:flex;gap:10px;font-size:11px;color:var(--muted);flex-shrink:0;}
.mod-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.mod-body{display:flex;flex:1;overflow:hidden;}
.mod-left{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
.mod-right{width:300px;border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.mod-ai-hdr{padding:12px 14px;border-bottom:1px solid var(--border);}
.mod-ai-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.mod-ai-btns{display:flex;flex-direction:column;gap:6px;}
.mod-ai-out{flex:1;padding:14px;overflow-y:auto;font-size:13px;line-height:1.75;white-space:pre-wrap;}
.mod-ai-empty{color:var(--muted);font-size:13px;text-align:center;margin-top:30px;padding:0 12px;}

/* ── Channel page ── */
.ch-hero{background:linear-gradient(135deg,rgba(124,58,237,.08),transparent);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;display:flex;gap:16px;align-items:center;}
.ch-avatar{width:68px;height:68px;border-radius:50%;object-fit:cover;border:3px solid var(--purple);flex-shrink:0;box-shadow:0 0 20px var(--pglow);}
.ch-av-ph{width:68px;height:68px;border-radius:50%;background:var(--pdim);border:3px solid var(--purple);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ch-av-ph svg{width:28px;height:28px;color:var(--pl);}
.ch-meta{flex:1;min-width:0;}
.ch-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ch-handle{font-size:12px;color:var(--muted);margin-bottom:8px;}
.ch-qs{display:flex;gap:16px;flex-wrap:wrap;}
.ch-q{font-size:12px;color:var(--muted);}
.ch-q strong{color:var(--text);font-weight:600;}

/* ── Charts ── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
.chart-box-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.chart-box-title .ct-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── Perf table ── */
.perf-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;overflow-x:auto;margin-bottom:20px;}
.perf-table{width:100%;border-collapse:collapse;min-width:500px;}
.perf-table th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);background:var(--card2);}
.perf-table td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.perf-table tr:last-child td{border-bottom:none;}
.perf-table tr:hover td{background:var(--card2);}
.perf-thumb{width:54px;height:30px;object-fit:cover;border-radius:4px;}
.rank-n{width:22px;height:22px;border-radius:50%;background:var(--pdim);color:var(--pl);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ── Niche finder ── */
.signal-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;transition:border .2s;}
.signal-card:hover{border-color:rgba(124,58,237,.3);}
.sig-sat-bar{height:7px;border-radius:4px;background:var(--border);margin:10px 0 6px;overflow:hidden;}
.sig-sat-fill{height:100%;border-radius:4px;}
.ch-signal-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px 16px;display:flex;gap:12px;transition:border .2s;}
.ch-signal-card:hover{border-color:rgba(124,58,237,.3);}
.sig-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
.sig-info{flex:1;min-width:0;}
.sig-name{font-size:13px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sig-stats{display:flex;gap:8px;font-size:11px;color:var(--muted);flex-wrap:wrap;margin-bottom:7px;}
.sig-video{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;gap:8px;align-items:center;cursor:pointer;transition:border .15s;}
.sig-video:hover{border-color:var(--border-h);}
.sig-vid-thumb{width:54px;height:30px;object-fit:cover;border-radius:4px;flex-shrink:0;}
.sig-vid-title{font-size:11px;flex:1;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.fire-b{font-size:10px;background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.25);border-radius:4px;padding:1px 6px;font-weight:600;}
.hot-b{font-size:10px;background:rgba(251,191,36,.15);color:var(--yellow);border:1px solid rgba(251,191,36,.25);border-radius:4px;padding:1px 6px;font-weight:600;}
.new-b{font-size:10px;background:rgba(96,165,250,.15);color:var(--blue);border:1px solid rgba(96,165,250,.25);border-radius:4px;padding:1px 6px;font-weight:600;}

/* ── Misc ── */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:5px;}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease forwards;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--pl);animation:pulse 2s infinite;flex-shrink:0;}
.error-msg{font-size:12px;color:var(--red);margin-top:6px;}
.empty-st{text-align:center;color:var(--muted);font-size:13px;padding:48px 20px;}
.empty-lnk{color:var(--pl);cursor:pointer;}
.row{display:flex;align-items:center;gap:10px;}
.row-b{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.col{display:flex;flex-direction:column;gap:8px;}
.insight-block{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.ins-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.ins-lbl{font-size:10px;color:var(--pl);text-transform:uppercase;letter-spacing:.8px;font-weight:600;}
.notif-panel{display:flex;flex-direction:column;gap:7px;margin-bottom:20px;}
.notif-item{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 13px;}
.notif-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.notif-txt{font-size:13px;}
.notif-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.tab-bar{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:16px;}
.tab-btn{flex:1;padding:7px;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;background:transparent;color:var(--muted);}
.tab-btn.active{background:var(--purple);color:#fff;}
.comp-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 15px;display:flex;align-items:center;gap:12px;transition:border .2s;}
.comp-row:hover{border-color:rgba(124,58,237,.3);}
.comp-av{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;}
.comp-info{flex:1;min-width:0;}
.comp-name{font-size:13px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.comp-handle{font-size:11px;color:var(--muted);margin-bottom:4px;}
.comp-stats{display:flex;gap:10px;font-size:11px;color:var(--muted);}
.target-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;}
.target-info{flex:1;}
.target-lbl{font-size:13px;font-weight:500;margin-bottom:5px;}
.tbar-bg{background:var(--border);border-radius:4px;height:6px;}
.tbar{height:6px;border-radius:4px;background:var(--purple);transition:width .4s;}
.tbar-prog{font-size:11px;color:var(--muted);margin-top:4px;}
.swipe-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;transition:border .2s;}
.swipe-card:hover{border-color:rgba(124,58,237,.4);}
.idea-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 15px;transition:border .2s;}
.idea-card:hover{border-color:rgba(124,58,237,.4);}
.idea-num{width:24px;height:24px;border-radius:6px;background:var(--pdim);color:var(--pl);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

@media(max-width:768px){
  #sidebar{display:none;}
  #bottom-nav{display:flex;}
  #main{padding-bottom:var(--bottomnav);}
  #page{padding:18px 13px 80px;}
  .mod-right{display:none;}

const NAV_ITEMS = [

];
const BOT_NAV=[{id:'dashboard',label:'Home'},{id:'feed',label:'Feed'},{id:'niche',label:'Niche'},{id:'channel',label:'Channel'},{id:'competitors',label:'More'}];

// ─── Utils ────────────────────────────────────────────────────────────────────
const fN=n=>{n=parseInt(n)||0;if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString();};
const ago=d=>{const diff=Date.now()-new Date(d);const days=Math.floor(diff/86400000);if(days===0)return'Today';if(days===1)return'Yesterday';if(days<30)return days+'d ago';if(days<365)return Math.floor(days/30)+'mo ago';return Math.floor(days/365)+'y ago';};
const tag=(t,c='#7c3aed')=>`<span class="tag" style="background:${c}22;color:${c};border:1px solid ${c}44">${t}</span>`;
const skRow=(n=4)=>Array(n).fill(0).map(()=>`<div class="skeleton" style="height:88px;border-radius:13px;"></div>`).join('');

async function ytF(p){const r=await fetch(`https://www.googleapis.com/youtube/v3/${p}&key=${YT_KEY}`);if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'YouTube API error');}return r.json();}
async function clF(prompt,sys=''){const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys||'You are a YouTube Shorts content strategist. Be concise, specific, actionable.',messages:[{role:'user',content:prompt}]})});const d=await r.json();return d.content?.[0]?.text||'No response';}

// ─── Init ─────────────────────────────────────────────────────────────────────
window.onload=async()=>{
  renderNav();renderBotNav();
  try{const h=MY_CHANNEL.replace('@','');const d=await ytF(`channels?part=statistics,snippet&forHandle=${h}`);if(d.items?.length){S.myStats=d.items[0].statistics;S.myChannelId=d.items[0].id;S.myAvatar=d.items[0].snippet?.thumbnails?.medium?.url||null;}}catch(e){}
  navigate('dashboard');
};

function renderNav(){document.getElementById('nav').innerHTML=NAV_ITEMS.map(n=>`<button class="nav-item ${S.page===n.id?'active':''}" onclick="navigate('${n.id}')">${IC[n.id]||IC.dashboard}<span style="overflow:hidden;">${n.label}</span></button>`).join('');}
function renderBotNav(){document.getElementById('bottom-nav').innerHTML=BOT_NAV.map(n=>`<button class="bnav-item ${S.page===n.id?'active':''}" onclick="navigate('${n.id}')">${IC[n.id]||IC.dashboard}<span class="bnav-label">${n.label}</span></button>`).join('');}
function navigate(p){S.page=p;renderNav();renderBotNav();const pg=document.getElementById('page');pg.innerHTML='';pg.className='fade-up';void pg.offsetWidth;({dashboard:renderDash,competitors:renderComp,feed:renderFeed,watchlist:renderWL,swipefile:renderSF,ideas:renderIdeas,insights:renderInsights,targets:renderTargets,channel:renderChannel,niche:renderNiche})[p]?.();document.getElementById('main').scrollTo(0,0);}
function toggleSB(){S.sbCollapsed=!S.sbCollapsed;document.getElementById('sidebar').classList.toggle('collapsed',S.sbCollapsed);document.getElementById('col-lbl').textContent=S.sbCollapsed?'→':'← Collapse';}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function renderDash(){
  const{competitors:comp,watchlist:wl,myStats:ms,swipeFile:sf,targets:tg,targetProgress:tp}=S;
  const notifs=[];
  notifs.push({c:'var(--pl)',t:'Welcome back to CreatorLens',s:'Your intelligence tool is ready'});
  if(ms)notifs.push({c:'var(--green)',t:`${MY_CHANNEL} · ${fN(ms.subscriberCount)} subscribers`,s:`${fN(ms.viewCount)} total views · ${fN(ms.videoCount)} videos`});
  if(!comp.length)notifs.push({c:'var(--yellow)',t:'No competitors tracked yet',s:'Add channels in Competitors'});
  else notifs.push({c:'var(--blue)',t:`${comp.length} competitor${comp.length!==1?'s':''} tracked`,s:comp.map(c=>c.title).join(', ')});
  if(wl.length)notifs.push({c:'var(--yellow)',t:`${wl.length} video${wl.length!==1?'s':''} in Watchlist`,s:'Review and analyse them'});
  if(sf.length)notifs.push({c:'var(--green)',t:`${sf.length} items in Swipe File`,s:'Your content weapon is growing'});
  const inc=tg.filter(t=>(tp[t.id]||0)<t.goal);
  if(inc.length)notifs.push({c:'var(--red)',t:`${inc.length} weekly target${inc.length!==1?'s':''} in progress`,s:'Head to Targets'});
  const totalV=comp.reduce((a,c)=>a+(parseInt(c.videoCount)||0),0);
  document.getElementById('page').innerHTML=`
    <div class="row-b page-header"><div><div class="page-title">Dashboard</div><div class="page-sub">Content intelligence overview</div></div><div style="font-size:11px;color:var(--muted);">${new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div></div>
    <div class="notif-panel">${notifs.map(n=>`<div class="notif-item"><div class="notif-dot" style="background:${n.c};"></div><div><div class="notif-txt">${n.t}</div><div class="notif-sub">${n.s}</div></div></div>`).join('')}</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Competitors</div><div class="stat-value" style="color:var(--pl)">${comp.length}</div></div>
      <div class="stat-card"><div class="stat-label">Indexed</div><div class="stat-value">${fN(totalV)}</div><div class="stat-sub">Videos</div></div>
      <div class="stat-card"><div class="stat-label">Watchlist</div><div class="stat-value" style="color:var(--yellow)">${wl.length}</div></div>
      ${ms?`<div class="stat-card"><div class="stat-label">Subscribers</div><div class="stat-value" style="color:var(--green)">${fN(ms.subscriberCount)}</div><div class="stat-sub">${MY_CHANNEL}</div></div>`:''}
    </div>
    ${ms?`<div style="background:linear-gradient(135deg,var(--card),rgba(124,58,237,.08));border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px;">
      <div class="row" style="gap:12px;margin-bottom:12px;">${S.myAvatar?`<img src="${S.myAvatar}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--purple);">`:''}
        <div class="pulse-dot"></div><div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:600;">${MY_CHANNEL}</div>${tag('My Channel','#34d399')}
      </div>
      <div style="display:flex;gap:22px;flex-wrap:wrap;">
        <div><div class="stat-label">SUBS</div><div style="font-family:'Syne';font-size:20px;font-weight:700;color:var(--green)">${fN(ms.subscriberCount)}</div></div>
        <div><div class="stat-label">VIEWS</div><div style="font-family:'Syne';font-size:20px;font-weight:700;">${fN(ms.viewCount)}</div></div>
        <div><div class="stat-label">VIDEOS</div><div style="font-family:'Syne';font-size:20px;font-weight:700;">${fN(ms.videoCount)}</div></div>
      </div>
    </div>`:''}
    <div class="row-b" style="margin-bottom:12px;"><div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:600;">Tracked Competitors</div><button class="btn btn-ghost btn-sm" onclick="navigate('competitors')">Manage →</button></div>
    ${!comp.length?`<div class="empty-st">No competitors yet. <span class="empty-lnk" onclick="navigate('competitors')">Add one →</span></div>`:`<div class="col" style="gap:8px;">${comp.slice(0,5).map(c=>`<div class="comp-row"><img class="comp-av" src="${c.thumbnail}" onerror="this.style.display='none'"><div class="comp-info"><div class="comp-name">${c.title}</div><div class="comp-handle">${c.handle}</div><div class="comp-stats"><span>👥 ${fN(c.subscriberCount)}</span><span>🎬 ${fN(c.videoCount)}</span></div></div><button class="btn btn-ghost btn-sm" onclick="navigate('feed')">Feed →</button></div>`).join('')}</div>`}`;
}

// ─── Competitors ──────────────────────────────────────────────────────────────
function renderComp(){document.getElementById('page').innerHTML=`<div class="page-header"><div class="page-title">Competitors</div><div class="page-sub">Track and manage channels</div></div><div class="card card-pad" style="margin-bottom:16px;"><div style="font-size:13px;font-weight:500;margin-bottom:12px;">Add Channel</div><div class="row"><input type="text" id="ci" placeholder="@SalishMatter" style="flex:1;" onkeydown="if(event.key==='Enter')addComp()"><button class="btn btn-primary" id="add-btn" onclick="addComp()">Add</button></div><div id="c-err" class="error-msg" style="display:none;"></div></div><div id="c-list">${compList()}</div>`;}
function compList(){if(!S.competitors.length)return`<div class="empty-st">No competitors yet.</div>`;return`<div class="col" style="gap:10px;">${S.competitors.map(c=>`<div class="comp-row fade-up"><img class="comp-av" src="${c.thumbnail}" onerror="this.style.display='none'"><div class="comp-info"><div class="comp-name">${c.title}</div><div class="comp-handle">${c.handle}</div><div class="comp-stats"><span>👥 ${fN(c.subscriberCount)}</span><span>🎬 ${fN(c.videoCount)}</span><span>👁 ${fN(c.viewCount)}</span></div></div><button class="btn btn-danger btn-sm" onclick="rmComp('${c.id}')">Remove</button></div>`).join('')}</div>`;}
async function addComp(){const inp=document.getElementById('ci'),err=document.getElementById('c-err'),btn=document.getElementById('add-btn');const h=inp.value.trim();if(!h)return;btn.disabled=true;btn.textContent='Adding...';err.style.display='none';try{const d=await ytF(`channels?part=snippet,statistics&forHandle=${h.replace('@','')}`);if(!d.items?.length)throw new Error('Channel not found.');const ch=d.items[0];const c={id:ch.id,title:ch.snippet.title,handle:'@'+h.replace('@',''),thumbnail:ch.snippet.thumbnails?.medium?.url||ch.snippet.thumbnails?.default?.url||'',subscriberCount:ch.statistics.subscriberCount,videoCount:ch.statistics.videoCount,viewCount:ch.statistics.viewCount};if(!S.competitors.find(x=>x.id===c.id)){S.competitors.push(c);persist();}inp.value='';document.getElementById('c-list').innerHTML=compList();}catch(e){err.textContent=e.message;err.style.display='block';}btn.disabled=false;btn.textContent='Add';}
function rmComp(id){S.competitors=S.competitors.filter(c=>c.id!==id);persist();document.getElementById('c-list').innerHTML=compList();}

// ─── Video Feed ───────────────────────────────────────────────────────────────
let feedVids=[];
function renderFeed(){
  document.getElementById('page').innerHTML=`
    <div class="row-b page-header">
      <div><div class="page-title">Video Feed</div><div class="page-sub">Tap card to enter Shorts player</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <select id="f-ch" style="width:auto;"><option value="all">All Channels</option>${S.competitors.map(c=>`<option value="${c.id}">${c.title}</option>`).join('')}</select>
        <select id="f-sort" style="width:auto;"><option value="date">Latest</option><option value="viewCount">Top Views</option></select>
        <button class="btn btn-primary btn-sm" onclick="loadFeed()">Load</button>
      </div>
    </div>
    <div id="f-out">${!S.competitors.length?`<div class="empty-st">Add competitors first.</div>`:`<div class="col" style="gap:10px;">${skRow()}</div>`}</div>`;
  if(S.competitors.length)loadFeed();
}
async function loadFeed(){
  const chId=document.getElementById('f-ch')?.value||'all',sort=document.getElementById('f-sort')?.value||'date',out=document.getElementById('f-out');
  if(!out)return;
  out.innerHTML=`<div class="col" style="gap:10px;">${skRow()}</div>`;
  try{
    const chs=chId==='all'?S.competitors:S.competitors.filter(c=>c.id===chId);
    feedVids=[];
    for(const ch of chs){
      const d=await ytF(`search?part=snippet&channelId=${ch.id}&type=video&order=${sort}&maxResults=20`);
      const ids=d.items?.map(v=>v.id.videoId).filter(Boolean).join(',');
      if(!ids)continue;
      const det=await ytF(`videos?part=statistics,snippet&id=${ids}`);
      feedVids.push(...(det.items||[]));
    }
    out.innerHTML=feedVids.length?`<div class="feed-list">${feedVids.map((v,i)=>feedCard(v,i)).join('')}</div>`:`<div class="empty-st">No videos found.</div>`;
  }catch(e){out.innerHTML=`<div class="empty-st" style="color:var(--red)">${e.message}</div>`;}
}
function feedCard(v,idx){
  const vid=v.id?.videoId||v.id;
  const views=fN(v.statistics?.viewCount),likes=fN(v.statistics?.likeCount),comments=fN(v.statistics?.commentCount);
  const thumb=v.snippet?.thumbnails?.medium?.url||v.snippet?.thumbnails?.default?.url||'';
  const title=(v.snippet?.title||'').replace(/'/g,"&#39;").replace(/"/g,'&quot;');
  const saved=S.watchlist.some(w=>(w.id?.videoId||w.id)===vid);
  return`<div class="feed-card fade-up">
    <div class="feed-inner">

function spRender(){

  document.getElementById('sp-title').textContent=v.snippet?.title||'';

  document.getElementById('sp-next-btn').disabled=spIdx===spVids.length-1;
  document.getElementById('sp-prog').style.width=`${((spIdx+1)/spVids.length)*100}%`;
  const saved=S.watchlist.some(w=>(w.id?.videoId||w.id)===vid);

      </div>`;

    if(cV){cV.destroy();cV=null;} if(cE){cE.destroy();cE=null;}

    const chartOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#13131e',titleColor:'#e8e8f5',bodyColor:'#6b6b90',borderColor:'#1e1e2e',borderWidth:1}},scales:{x:{ticks:{color:'#6b6b90',font:{size:9},maxRotation:45},grid:{color:'rgba(30,30,46,.6)'},border:{display:false}},y:{ticks:{color:'#6b6b90',font:{size:9}},grid:{color:'rgba(30,30,46,.6)'},border:{display:false}}}};

    cV=new Chart(document.getElementById('cv'),{type:'bar',data:{labels,datasets:[{data:viewData,backgroundColor:viewData.map(v=>v===maxV?'rgba(124,58,237,.9)':'rgba(124,58,237,.3)'),borderRadius:5,borderSkipped:false}]},options:{...chartOpts,plugins:{...chartOpts.plugins,tooltip:{...chartOpts.plugins.tooltip,callbacks:{label:ctx=>`${fN(ctx.raw)} views`}}},scales:{...chartOpts.scales,y:{...chartOpts.scales.y,ticks:{...chartOpts.scales.y.ticks,callback:v=>fN(v)}}}}});

    cE=new Chart(document.getElementById('ce'),{type:'line',data:{labels,datasets:[{data:ratioData,borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.07)',borderWidth:2,tension:.4,fill:true,pointBackgroundColor:'#34d399',pointRadius:3,pointHoverRadius:5}]},options:{...chartOpts,plugins:{...chartOpts.plugins,tooltip:{...chartOpts.plugins.tooltip,callbacks:{label:ctx=>`${ctx.raw}% like rate`}}},scales:{...chartOpts.scales,y:{...chartOpts.scales.y,ticks:{...chartOpts.scales.y.ticks,callback:v=>v+'%'}}}}});

    document.getElementById('ch-tbl').innerHTML=`
      <div class="perf-wrap">
        <table class="perf-table">
          <thead><tr><th>#</th><th>Thumb</th><th>Title</th><th>Views</th><th>Likes</th><th>Rate</th><th>Posted</th></tr></thead>
          <tbody>${sorted.slice(0,10).map((v,i)=>{
            const vw=parseInt(v.statistics?.viewCount||0),lk=parseInt(v.statistics?.likeCount||0);
            const rate=vw>0?((lk/vw)*100).toFixed(1):'0';
            const rc=parseFloat(rate)>3?'var(--green)':parseFloat(rate)>1?'var(--yellow)':'var(--red)';
            return`<tr><td><div class="rank-n">${i+1}</div></td><td><img class="perf-thumb" src="${v.snippet?.thumbnails?.default?.url||''}"></td><td style="max-width:160px;"><div style="font-size:11px;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${v.snippet?.title||''}</div></td><td style="font-family:'Syne',sans-serif;font-weight:600;color:var(--pl);white-space:nowrap;">${fN(vw)}</td><td style="white-space:nowrap;">${fN(lk)}</td><td style="color:${rc};font-weight:600;">${rate}%</td><td style="color:var(--muted);white-space:nowrap;font-size:11px;">${ago(v.snippet?.publishedAt)}</td></tr>`;
          }).join('')}</tbody>
        </table>
      </div>`;

    document.getElementById('ch-vids').innerHTML=myVids.length?`<div class="feed-list">${myVids.map((v,i)=>feedCard(v,i)).join('')}</div>`:`<div class="empty-st">No videos.</div>`;
  }catch(e){pg.innerHTML+=`<div class="empty-st" style="color:var(--red)">${e.message}</div>`;}
}

// ─── Niche Finder v3 — Signal-Based ──────────────────────────────────────────
// Broad seed terms that pull generic Shorts content — we filter AFTER by channel metrics
// This simulates the raw Shorts feed rather than keyword-specific results
const SEED_TERMS = [
  '#shorts','shorts 2025','viral shorts','trending shorts',
  'shorts challenge','shorts story','shorts reaction','shorts facts',
  'shorts motivation','shorts satisfying','shorts pov','shorts dark'
];

  document.getElementById('page').innerHTML=`
    <div class="row-b page-header">
      <div><div class="page-title">🔥 Niche Finder</div><div class="page-sub">Signal-based detection — no keyword bias</div></div>
      <div style="font-size:10px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 10px;">~1,500 quota/scan</div>
    </div>

    <!-- Signal Scanner -->
    <div class="card card-pad" style="margin-bottom:20px;">
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px;">📡 Signal Scanner</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">Pulls the most viewed Shorts from the last 14 days across broad categories, then filters for channels under 50 videos that are suddenly going viral. No keyword bias.</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
        <div style="flex:1;min-width:120px;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px;">Max Videos Posted</div>
          <select id="n-maxvids" style="width:100%;"><option value="20">Under 20 videos</option><option value="50" selected>Under 50 videos</option><option value="100">Under 100 videos</option></select>
        </div>
        <div style="flex:1;min-width:120px;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px;">Max Subscribers</div>
          <select id="n-maxsubs" style="width:100%;"><option value="5000">Under 5K</option><option value="10000" selected>Under 10K</option><option value="20000">Under 20K</option></select>
        </div>
        <div style="flex:1;min-width:120px;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px;">Min Views on Video</div>
          <select id="n-minviews" style="width:100%;"><option value="50000">50K+</option><option value="100000" selected>100K+</option><option value="500000">500K+</option></select>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="sig-btn" onclick="runSignalScan()">🔍 Scan Signals Now</button>
    </div>

    <div id="sig-results"></div>

    <div style="margin-top:28px;">
      <div class="row-b" style="margin-bottom:14px;">

          <div style="font-size:11px;color:var(--muted);margin-top:2px;">Under 50 videos · Under 10K subs · Disproportionate views · Algorithm signal</div>
        </div>
        <button class="btn btn-ghost btn-sm" id="push-btn" onclick="loadPushed()">↻ Detect</button>

async function runSignalScan(){
  const btn=document.getElementById('sig-btn'),out=document.getElementById('sig-results');
  const maxVids=parseInt(document.getElementById('n-maxvids').value)||50;
  const maxSubs=parseInt(document.getElementById('n-maxsubs').value)||10000;
  const minViews=parseInt(document.getElementById('n-minviews').value)||100000;
  btn.disabled=true; btn.textContent='Scanning signals...';
  out.innerHTML=`<div style="font-size:13px;color:var(--muted);margin-bottom:12px;">Scanning ${SEED_TERMS.length} signal sources for channels under ${maxVids} videos with ${fN(minViews)}+ views...</div><div class="col" style="gap:10px;">${Array(4).fill(0).map(()=>`<div class="skeleton" style="height:130px;border-radius:14px;"></div>`).join('')}</div>`;

  const after=new Date(Date.now()-14*86400000).toISOString();
  const allVids=[];
  const seenVids=new Set();

  try{
    // Pull from multiple seed terms to get broad coverage
    for(const seed of SEED_TERMS.slice(0,8)){
      try{
        const d=await ytF(`search?part=snippet&q=${encodeURIComponent(seed)}&type=video&videoDuration=short&order=viewCount&publishedAfter=${after}&maxResults=10`);
        for(const item of (d.items||[])){
          const vid=item.id?.videoId;
          if(vid&&!seenVids.has(vid)){seenVids.add(vid);allVids.push(item);}
        }
      }catch(e){continue;}
    }

    if(!allVids.length)throw new Error('No signals found. Try again.');

    // Get video stats
    const vidIds=allVids.map(v=>v.id?.videoId).filter(Boolean).slice(0,50).join(',');
    const chIds=[...new Set(allVids.map(v=>v.snippet?.channelId).filter(Boolean))].slice(0,30).join(',');

    const[vDet,cDet]=await Promise.all([
      ytF(`videos?part=statistics,snippet&id=${vidIds}`),
      ytF(`channels?part=statistics,snippet&id=${chIds}`),
    ]);

    const vids=vDet.items||[];
    const chs=cDet.items||[];
    const chMap={};chs.forEach(c=>{chMap[c.id]=c;});
    const vidMap={};vids.forEach(v=>{vidMap[v.id]=v;});

    // Filter: the real signal
    // Under maxVids total videos posted, under maxSubs subs, video has minViews+ views
    const signals=[];
    const seenCh=new Set();

    for(const rawVid of allVids){
      const vid=rawVid.id?.videoId;
      const det=vidMap[vid];
      if(!det)continue;
      const chId=det.snippet?.channelId||rawVid.snippet?.channelId;
      if(seenCh.has(chId))continue;
      const ch=chMap[chId];
      if(!ch)continue;
      const subs=parseInt(ch.statistics?.subscriberCount||0);
      const vCount=parseInt(ch.statistics?.videoCount||0);
      const views=parseInt(det.statistics?.viewCount||0);
      if(subs>maxSubs||vCount>maxVids||views<minViews)continue;
      seenCh.add(chId);
      const ratio=subs>0?views/subs:views;
      signals.push({ch,vid:det,subs,vCount,views,ratio});
    }

    signals.sort((a,b)=>b.ratio-a.ratio);

    if(!signals.length){
      out.innerHTML=`<div class="empty-st">No channels matched your filters. Try loosening the criteria (more videos, higher subs, lower min views).</div>`;
      btn.disabled=false;btn.textContent='🔍 Scan Signals Now';return;
    }

    out.innerHTML=`
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px;">Signal Results — ${signals.length} channels detected</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">Sorted by views-to-subscribers ratio — highest ratio = strongest algorithm push signal</div>
      <div class="col" style="gap:12px;">${signals.map((s,i)=>{
        const av=s.ch.snippet?.thumbnails?.medium?.url||s.ch.snippet?.thumbnails?.default?.url||'';
        const thumb=s.vid.snippet?.thumbnails?.medium?.url||'';
        const vid=s.vid.id;
        const title=s.vid.snippet?.title||'';
        const isFire=s.ratio>100,isHot=s.ratio>20,isNew=s.vCount<10;
        return`<div class="signal-card fade-up" style="animation-delay:${i*40}ms">
          <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;">
            <img src="${av}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;" onerror="this.style.display='none'">
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px;">
                <div style="font-size:14px;font-weight:600;">${s.ch.snippet?.title||'Unknown'}</div>
                ${isFire?`<span class="fire-b">🔥 ON FIRE</span>`:isHot?`<span class="hot-b">⚡ HOT</span>`:''}
                ${isNew?`<span class="new-b">🆕 Very New</span>`:''}
              </div>
              <div style="display:flex;gap:10px;font-size:11px;color:var(--muted);flex-wrap:wrap;">
                <span>👥 ${fN(s.subs)} subs</span>
                <span>🎬 ${fN(s.vCount)} videos total</span>
                <span>👁 ${fN(s.views)} on this video</span>
                <span style="color:${isFire?'var(--red)':isHot?'var(--yellow)':'var(--green)'}">📈 ${s.ratio.toFixed(0)}x ratio</span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:${isFire?'var(--red)':isHot?'var(--yellow)':'var(--green)'};">${s.ratio.toFixed(0)}x</div>
              <div style="font-size:10px;color:var(--muted);">views/subs</div>
            </div>
          </div>
          <!-- Saturation bar -->
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;"><span>Signal Strength</span><span style="color:${isFire?'var(--red)':isHot?'var(--yellow)':'var(--green)'};">${isFire?'Extreme':isHot?'Strong':'Moderate'}</span></div>
          <div class="sig-sat-bar"><div class="sig-sat-fill" style="width:${Math.min(100,s.ratio/2)}%;background:${isFire?'var(--red)':isHot?'var(--yellow)':'var(--green)'};"></div></div>
          <!-- Top video -->
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;margin-top:12px;text-transform:uppercase;letter-spacing:.6px;">Viral Video</div>
          <div class="sig-video" onclick="openMod('${vid}','${title.replace(/'/g,"\\'")}','${fN(s.views)}','${fN(s.vid.statistics?.likeCount)}')">
            ${thumb?`<img class="sig-vid-thumb" src="${thumb}">`:''}
            <div class="sig-vid-title">${title}</div>
            <button class="btn btn-primary btn-sm" style="flex-shrink:0;">Analyse</button>
          </div>
        </div>`;
      }).join('')}</div>`;

    // AI pattern analysis
    const top3=signals.slice(0,3);
    const aiContext=top3.map(s=>`Channel: ${s.ch.snippet?.title} | ${fN(s.vCount)} videos | ${fN(s.subs)} subs | Video: "${s.vid.snippet?.title}" | ${fN(s.views)} views | Ratio: ${s.ratio.toFixed(0)}x`).join('\n');
    clF(`You are a YouTube niche analyst. These are REAL channels being pushed by YouTube's algorithm right now:\n\n${aiContext}\n\nFor a Matterverse creator (Salish/Jordan Matter niche, teens 12-17):\n1. What content pattern do these channels share?\n2. What format/niche is YouTube currently pushing?\n3. One specific actionable idea for Matterverse based on this signal\n\nBe direct. 3-4 sentences max.`).then(res=>{
      const div=document.createElement('div');
      div.className='insight-block fade-up';
      div.style.marginTop='16px';
      div.innerHTML=`<div class="ins-meta"><div class="pulse-dot"></div><div class="ins-lbl">AI Pattern Analysis</div></div><div style="font-size:13px;line-height:1.8;white-space:pre-wrap;">${res}</div>`;
      out.appendChild(div);
    }).catch(()=>{});

  }catch(e){out.innerHTML=`<div class="empty-st" style="color:var(--red)">${e.message}</div>`;}
  btn.disabled=false;btn.textContent='🔍 Scan Signals Now';
}

async function loadPushed(){
  const btn=document.getElementById('push-btn'),out=document.getElementById('push-out');
  if(!btn||!out)return;
  btn.disabled=true;btn.textContent='Detecting...';
  out.innerHTML=`<div class="col" style="gap:10px;">${Array(4).fill(0).map(()=>`<div class="skeleton" style="height:110px;border-radius:13px;"></div>`).join('')}</div>`;

  const after=new Date(Date.now()-10*86400000).toISOString();
  // Use varied broad seeds to avoid getting the same channels
  const seeds=['shorts 2025','viral short video','trending short','#shortsvideo','short clips viral','new shorts today','shorts going viral','mini video viral'];
  const allVids=[];
  const seenV=new Set();

  try{
    for(const seed of seeds){
      try{
        const d=await ytF(`search?part=snippet&q=${encodeURIComponent(seed)}&type=video&videoDuration=short&order=viewCount&publishedAfter=${after}&maxResults=8`);
        for(const item of (d.items||[])){const vid=item.id?.videoId;if(vid&&!seenV.has(vid)){seenV.add(vid);allVids.push(item);}}
      }catch(e){continue;}
    }

    const vidIds=allVids.map(v=>v.id?.videoId).filter(Boolean).slice(0,40).join(',');
    const chIds=[...new Set(allVids.map(v=>v.snippet?.channelId).filter(Boolean))].slice(0,25).join(',');
    const[vDet,cDet]=await Promise.all([ytF(`videos?part=statistics,snippet&id=${vidIds}`),ytF(`channels?part=statistics,snippet&id=${chIds}`)]);
    const chs=cDet.items||[],vids=vDet.items||[];
    const chMap={};chs.forEach(c=>{chMap[c.id]=c;});
    const vMap={};vids.forEach(v=>{vMap[v.id]=v;});

    const pushed=[];
    const seenCh=new Set();
    for(const raw of allVids){
      const vid=raw.id?.videoId;
      const det=vMap[vid];
      if(!det)continue;
      const chId=det.snippet?.channelId||raw.snippet?.channelId;
      if(seenCh.has(chId))continue;
      const ch=chMap[chId];
      if(!ch)continue;
      const subs=parseInt(ch.statistics?.subscriberCount||0);
      const vCount=parseInt(ch.statistics?.videoCount||0);
      const views=parseInt(det.statistics?.viewCount||0);
      // Strict filter: under 50 videos, under 10K subs, 100K+ views
      if(subs>10000||vCount>50||views<100000)continue;
      seenCh.add(chId);
      const ratio=subs>0?views/subs:views;
      pushed.push({ch,vid:det,subs,vCount,views,ratio});
    }

    pushed.sort((a,b)=>b.ratio-a.ratio);

    if(!pushed.length){out.innerHTML=`<div class="empty-st">No channels matched strict filters right now. The algorithm changes daily — try again tomorrow or loosen filters in Signal Scanner.</div>`;btn.disabled=false;btn.textContent='↻ Detect';return;}

    out.innerHTML=`<div class="col" style="gap:10px;">${pushed.map(({ch,vid,subs,vCount,views,ratio})=>{
      const av=ch.snippet?.thumbnails?.medium?.url||ch.snippet?.thumbnails?.default?.url||'';
      const thumb=vid.snippet?.thumbnails?.medium?.url||'';
      const vidId=vid.id||'';
      const title=vid.snippet?.title||'';
      const isFire=ratio>100,isHot=ratio>20,isNew=vCount<10;
      return`<div class="ch-signal-card fade-up">
        <img class="sig-avatar" src="${av}" onerror="this.style.display='none'">
        <div class="sig-info">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;">
            <div class="sig-name">${ch.snippet?.title||'Unknown'}</div>
            ${isFire?`<span class="fire-b">🔥 ON FIRE</span>`:isHot?`<span class="hot-b">⚡ HOT</span>`:''}
            ${isNew?`<span class="new-b">🆕 New Channel</span>`:''}
          </div>
          <div class="sig-stats">
            <span>👥 ${fN(subs)} subs</span>
            <span>🎬 ${vCount} videos</span>
            <span>👁 ${fN(views)} on viral Short</span>
            <span style="color:${isFire?'var(--red)':isHot?'var(--yellow)':'var(--green)'}">📈 ${ratio.toFixed(0)}x ratio</span>
          </div>
          ${title?`<div class="sig-video" onclick="openMod('${vidId}','${title.replace(/'/g,"\\'")}','${fN(views)}','?')">
            ${thumb?`<img class="sig-vid-thumb" src="${thumb}">`:''}
            <div class="sig-vid-title">${title}</div>
            <span style="font-size:11px;color:var(--pl);flex-shrink:0;">Analyse →</span>
          </div>`:''}
        </div>
      </div>`;
    }).join('')}`;
  }catch(e){out.innerHTML=`<div class="empty-st" style="color:var(--red)">${e.message}</div>`;}
  btn.disabled=false;btn.textContent='↻ Detect';
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openMod(vid,title,views,likes){S.curVid={videoId:vid,title:decodeURIComponent((title||'').replace(/&#39;/g,"'").replace(/&quot;/g,'"')),views,likes};document.getElementById('mod-title').textContent=S.curVid.title;document.getElementById('mod-stats').innerHTML=`<span>👁 ${views}</span><span>👍 ${likes}</span>`;document.getElementById('mod-iframe').src=`https://www.youtube.com/embed/${vid}?autoplay=1`;document.getElementById('mod-note').value='';document.getElementById('mod-ai').innerHTML=`<div class="mod-ai-empty">Run an analysis to get AI insights</div>`;document.getElementById('mod-ov').classList.add('open');}
function closeMod(e){if(e&&e.target!==document.getElementById('mod-ov'))return;document.getElementById('mod-ov').classList.remove('open');document.getElementById('mod-iframe').src='';S.curVid=null;}
async function runAI(type){if(!S.curVid)return;const{title,views,likes}=S.curVid;const r=document.getElementById('mod-ai');const btns=document.querySelectorAll('.mod-ai-btns .btn');btns.forEach(b=>b.disabled=true);r.innerHTML=`<div class="col" style="gap:5px;">${[85,60,90,50,75].map(w=>`<div class="skeleton" style="height:12px;width:${w}%;"></div>`).join('')}</div>`;try{let p='';if(type==='steal')p=`Title:"${title}" Views:${views}\n1.Hook Template\n2.Story Structure beat by beat\n3.Rewrite for Matterverse (Salish/Jordan Matter, teens 12-17)\n4.Why it works`;if(type==='hook')p=`Score hook 1-10, 2 improvements.\nTitle:"${title}" Views:${views}`;if(type==='format')p=`Identify format, why it works, replicate.\nTitle:"${title}"`;if(type==='ideas')p=`5 ideas for Matterverse from:\nTitle:"${title}" Views:${views}`;const res=await clF(p);r.innerHTML=`<div class="fade-up" style="white-space:pre-wrap;">${res}</div>`;}catch(e){r.innerHTML=`<div style="color:var(--red);font-size:12px;">${e.message}</div>`;}btns.forEach(b=>b.disabled=false);}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('mod-ov').classList.remove('open');document.getElementById('mod-iframe').src='';if(document.getElementById('sp').classList.contains('open'))closeSP();}});

// Touch swipe support for shorts player — attached after DOM ready
window.addEventListener('load',()=>{
  const spBody=document.querySelector('.sp-body');
  if(spBody){
    spBody.addEventListener('touchstart',e=>{spTY=e.touches[0].clientY;},{passive:true});
    spBody.addEventListener('touchend',e=>{if(spTY===null)return;const diff=spTY-e.changedTouches[0].clientY;if(Math.abs(diff)>60)spNav(diff>0?1:-1);spTY=null;},{passive:true});
  }
});
