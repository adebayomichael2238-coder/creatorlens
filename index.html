<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CreatorLens</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #08080e; --surface: #0f0f18; --card: #13131e; --card2: #181825;
    --border: #1c1c2e; --border-hover: #7c3aed;
    --purple: #7c3aed; --purple-light: #a78bfa; --purple-dim: rgba(124,58,237,0.12); --purple-glow: rgba(124,58,237,0.25);
    --text: #e8e8f5; --text-muted: #6b6b90; --text-dim: #2e2e45;
    --green: #34d399; --yellow: #fbbf24; --red: #f87171; --blue: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 2px; }

  #app { display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: width .25s ease; overflow: hidden; }
  #sidebar.collapsed { width: 58px; }
  #main { flex: 1; overflow-y: auto; position: relative; }
  #page { max-width: 1080px; margin: 0 auto; padding: 32px 28px; }

  .logo { padding: 18px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; white-space: nowrap; overflow: hidden; }
  .logo-icon { width: 34px; height: 34px; border-radius: 9px; background: var(--purple); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; box-shadow: 0 0 20px var(--purple-glow); }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; }
  .logo-text span { color: var(--purple-light); }
  nav { flex: 1; padding: 10px 7px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; overflow-x: hidden; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; border: none; background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400; cursor: pointer; text-align: left; white-space: nowrap; overflow: hidden; border-left: 2px solid transparent; transition: all .15s; }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active { background: var(--purple-dim); color: var(--purple-light); border-left-color: var(--purple); font-weight: 500; }
  .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
  .collapse-btn { margin: 10px 7px; padding: 8px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: flex-end; gap: 6px; transition: all .15s; white-space: nowrap; overflow: hidden; }
  .collapse-btn:hover { border-color: var(--purple); color: var(--text); }
  #sidebar.collapsed .collapse-btn { justify-content: center; }

  input, textarea, select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 13px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; transition: border .2s; width: 100%; }
  input:focus, textarea:focus { border-color: var(--purple); }
  select { cursor: pointer; }
  textarea { resize: none; line-height: 1.6; }

  .btn { border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all .2s; font-size: 13px; padding: 10px 18px; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--purple); color: #fff; box-shadow: 0 0 20px var(--purple-glow); }
  .btn-primary:hover { background: #6d28d9; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }
  .btn-danger { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
  .btn-danger:hover { background: rgba(248,113,113,0.2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-full { width: 100%; justify-content: center; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; }
  .card-pad { padding: 20px; }

  .stats-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; flex: 1; min-width: 110px; }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 5px; }

  .page-header { margin-bottom: 26px; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 3px; }
  .page-sub { color: var(--text-muted); font-size: 13px; }

  .tag { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; border-radius: 4px; padding: 2px 7px; }

  /* Video grid */
  .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
  .video-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border .2s, transform .2s; }
  .video-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
  .video-thumb { position: relative; cursor: pointer; }
  .video-thumb img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; transition: opacity .2s; }
  .video-thumb:hover img { opacity: 0.85; }
  .video-thumb iframe.hover-player { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; }
  .video-thumb:hover iframe.hover-player { display: block; }
  .video-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.75), transparent); display: flex; align-items: flex-end; padding: 8px 10px; pointer-events: none; }
  .video-date { font-size: 11px; color: rgba(255,255,255,.75); }
  .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,.65); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; font-size: 15px; padding-left: 3px; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .video-thumb:hover .play-btn { opacity: 1; }
  .video-info { padding: 12px 13px; }
  .video-title { font-size: 13px; font-weight: 500; line-height: 1.4; margin-bottom: 8px; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .video-meta { display: flex; gap: 10px; font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
  .video-actions { display: flex; gap: 6px; }

  /* ─── Shorts Swipe Player ─── */
  #shorts-player { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
  #shorts-player.open { display: flex; }
  .shorts-top-bar { position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: 14px 18px; display: flex; align-items: center; gap: 12px; background: linear-gradient(to bottom, rgba(0,0,0,.8), transparent); }
  .shorts-back { background: rgba(255,255,255,0.12); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; cursor: pointer; backdrop-filter: blur(6px); flex-shrink: 0; }
  .shorts-channel { flex: 1; font-size: 13px; font-weight: 500; color: #fff; }
  .shorts-ai-btn { background: var(--purple); border: none; border-radius: 20px; color: #fff; font-size: 12px; font-weight: 600; padding: 7px 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 0 16px var(--purple-glow); }

  .shorts-container { flex: 1; position: relative; overflow: hidden; touch-action: pan-y; }
  .shorts-slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; transition: transform .35s cubic-bezier(.4,0,.2,1); }
  .shorts-slide iframe { width: 100%; height: 100%; border: none; pointer-events: auto; }

  .shorts-side-actions { position: absolute; right: 16px; bottom: 120px; display: flex; flex-direction: column; gap: 18px; align-items: center; z-index: 10; }
  .shorts-action { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .shorts-action-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,.12); backdrop-filter: blur(6px); border: none; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .shorts-action-btn:hover { background: rgba(255,255,255,.22); }
  .shorts-action-btn.saved { background: rgba(124,58,237,.5); }
  .shorts-action-label { font-size: 10px; color: rgba(255,255,255,.7); }

  .shorts-bottom { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; padding: 16px 18px 24px; background: linear-gradient(to top, rgba(0,0,0,.85), transparent); }
  .shorts-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 6px; line-height: 1.4; }
  .shorts-stats { font-size: 12px; color: rgba(255,255,255,.65); }
  .shorts-nav { display: flex; justify-content: center; gap: 10px; margin-top: 14px; }
  .shorts-nav-btn { background: rgba(255,255,255,.12); border: none; border-radius: 20px; color: #fff; font-size: 13px; font-weight: 500; padding: 8px 20px; cursor: pointer; backdrop-filter: blur(6px); display: flex; align-items: center; gap: 6px; }
  .shorts-nav-btn:disabled { opacity: 0.3; }
  .shorts-progress { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--purple); transition: width .3s; }

  /* AI panel overlay */
  #shorts-ai-panel { position: absolute; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 20px; z-index: 20; transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1); max-height: 70vh; overflow-y: auto; }
  #shorts-ai-panel.open { transform: translateY(0); }
  .ai-panel-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .ai-panel-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 14px; }
  .ai-panel-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .ai-panel-result { font-size: 13px; line-height: 1.75; color: var(--text); white-space: pre-wrap; }

  /* Comp rows */
  .comp-row { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; transition: border .2s; }
  .comp-row:hover { border-color: rgba(124,58,237,.3); }
  .comp-avatar { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }
  .comp-info { flex: 1; }
  .comp-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .comp-handle { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .comp-stats { display: flex; gap: 14px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }

  /* Analyser modal */
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
  #modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 960px; max-height: 92vh; overflow: hidden; display: flex; flex-direction: column; }
  .modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .modal-title { flex: 1; font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .modal-stats { display: flex; gap: 12px; font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .modal-close { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; padding: 0 4px; }
  .modal-body { display: flex; flex: 1; overflow: hidden; }
  .modal-left { flex: 1; padding: 18px; display: flex; flex-direction: column; gap: 14px; min-width: 0; overflow-y: auto; }
  .modal-right { width: 310px; border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .modal-ai-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .modal-ai-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .modal-ai-btns { display: flex; flex-direction: column; gap: 7px; }
  .modal-ai-result { flex: 1; padding: 14px; overflow-y: auto; font-size: 13px; line-height: 1.75; color: var(--text); white-space: pre-wrap; }
  .modal-ai-empty { color: var(--text-muted); font-size: 13px; text-align: center; margin-top: 36px; padding: 0 16px; }

  /* Charts */
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .chart-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  .chart-wrap { position: relative; width: 100%; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

  /* Video performance table */
  .perf-table { width: 100%; border-collapse: collapse; }
  .perf-table th { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .perf-table td { padding: 10px 12px; font-size: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .perf-table tr:last-child td { border-bottom: none; }
  .perf-table tr:hover td { background: var(--card2); }
  .perf-thumb { width: 56px; height: 32px; object-fit: cover; border-radius: 4px; }
  .rank-badge { width: 22px; height: 22px; border-radius: 50%; background: var(--purple-dim); color: var(--purple-light); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

  /* Idea, target, swipe, notif, insight, playbook styles */
  .idea-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; transition: border .2s; }
  .idea-card:hover { border-color: rgba(124,58,237,.4); }
  .idea-num { width: 26px; height: 26px; border-radius: 7px; background: var(--purple-dim); color: var(--purple-light); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .idea-title { font-size: 14px; font-weight: 600; line-height: 1.4; flex: 1; }
  .idea-reason { font-size: 12px; color: var(--text-muted); line-height: 1.6; margin-top: 10px; }
  .notif-panel { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .notif-item { display: flex; align-items: flex-start; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .notif-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .notif-text { font-size: 13px; }
  .notif-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .target-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; }
  .target-info { flex: 1; }
  .target-label { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .target-bar-bg { background: var(--border); border-radius: 4px; height: 6px; width: 100%; }
  .target-bar { height: 6px; border-radius: 4px; background: var(--purple); transition: width .4s ease; }
  .target-progress { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
  .target-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .swipe-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; transition: border .2s; }
  .swipe-card:hover { border-color: rgba(124,58,237,.4); }
  .swipe-content { font-size: 13px; line-height: 1.6; margin-top: 10px; }
  .swipe-meta { font-size: 11px; color: var(--text-muted); }
  .playbook-video { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 8px; transition: border .2s; cursor: pointer; }
  .playbook-video:hover { border-color: rgba(124,58,237,.3); }
  .playbook-thumb { width: 80px; height: 45px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .playbook-info { flex: 1; min-width: 0; }
  .playbook-title { font-size: 12px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .playbook-stats { font-size: 11px; color: var(--text-muted); }
  .insight-block { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 22px; }
  .insight-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .insight-label { font-size: 11px; color: var(--purple-light); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .channel-banner { background: linear-gradient(135deg, var(--card) 0%, rgba(124,58,237,0.08) 100%); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 24px; }

  .skeleton { background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 5px; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp .3s ease forwards; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.35; } }

  .error-msg { font-size: 12px; color: var(--red); margin-top: 7px; }
  .empty-state { text-align: center; color: var(--text-muted); font-size: 13px; padding: 60px 20px; }
  .empty-link { color: var(--purple-light); cursor: pointer; }
  .row { display: flex; align-items: center; gap: 10px; }
  .row-between { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; }
  .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--purple-light); animation: pulse 2s infinite; flex-shrink: 0; }
  .tab-bar { display: flex; gap: 4px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 20px; }
  .tab-btn { flex: 1; padding: 8px; border: none; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; background: transparent; color: var(--text-muted); }
  .tab-btn.active { background: var(--purple); color: #fff; }

  @media (max-width: 700px) {
    #page { padding: 20px 14px; }
    .modal-right { display: none; }
    .charts-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div class="logo">
      <div class="logo-icon">🔭</div>
      <div class="logo-text">Creator<span>Lens</span></div>
    </div>
    <nav id="nav"></nav>
    <button class="collapse-btn" id="collapse-btn" onclick="toggleSidebar()">
      <span id="collapse-label">← Collapse</span>
    </button>
  </div>
  <div id="main"><div id="page"></div></div>
</div>

<!-- ─── Shorts Swipe Player ─── -->
<div id="shorts-player">
  <div class="shorts-top-bar">
    <button class="shorts-back" onclick="closeShortsPlayer()">←</button>
    <div class="shorts-channel" id="sp-channel"></div>
    <button class="shorts-ai-btn" onclick="toggleAIPanel()">🤖 AI Insights</button>
  </div>

  <div class="shorts-container" id="sp-container">
    <div class="shorts-slide" id="sp-slide-prev"></div>
    <div class="shorts-slide" id="sp-slide-curr"></div>
    <div class="shorts-slide" id="sp-slide-next"></div>
  </div>

  <div class="shorts-side-actions">
    <div class="shorts-action">
      <button class="shorts-action-btn" id="sp-save-btn" onclick="spToggleSave()">☆</button>
      <span class="shorts-action-label">Save</span>
    </div>
    <div class="shorts-action">
      <button class="shorts-action-btn" onclick="spSwipeFile()">🗂</button>
      <span class="shorts-action-label">Swipe</span>
    </div>
  </div>

  <div class="shorts-bottom">
    <div class="shorts-title" id="sp-title"></div>
    <div class="shorts-stats" id="sp-stats"></div>
    <div class="shorts-nav">
      <button class="shorts-nav-btn" id="sp-prev-btn" onclick="spNavigate(-1)">↑ Prev</button>
      <span id="sp-counter" style="font-size:12px;color:rgba(255,255,255,.5);align-self:center;"></span>
      <button class="shorts-nav-btn" id="sp-next-btn" onclick="spNavigate(1)">↓ Next</button>
    </div>
  </div>
  <div class="shorts-progress" id="sp-progress"></div>

  <!-- AI Panel -->
  <div id="shorts-ai-panel">
    <div class="ai-panel-handle"></div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const YT_KEY = 'AIzaSyAkKG_BTXlV3sxM_t0-EXnxq-8BOcyyaOc';
const MY_CHANNEL = '@MatterverseYT';

// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  myStats: null, myChannelId: null,

// ─── Utils ────────────────────────────────────────────────────────────────────
const fmtNum = n => { n=parseInt(n)||0; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1000)return(n/1000).toFixed(1)+'K'; return n.toString(); };
const timeAgo = d => { const diff=Date.now()-new Date(d); const days=Math.floor(diff/86400000); if(days===0)return'Today'; if(days===1)return'Yesterday'; if(days<30)return days+'d ago'; if(days<365)return Math.floor(days/30)+'mo ago'; return Math.floor(days/365)+'y ago'; };
const tag = (text,color='#7c3aed') => `<span class="tag" style="background:${color}22;color:${color};border:1px solid ${color}44">${text}</span>`;
const skeletonCards = (n=6) => Array(n).fill(0).map(()=>`<div style="background:var(--card);border-radius:12px;overflow:hidden;"><div class="skeleton" style="aspect-ratio:16/9;"></div><div style="padding:14px;display:flex;flex-direction:column;gap:8px;"><div class="skeleton" style="height:14px;width:85%;"></div><div class="skeleton" style="height:12px;width:55%;"></div></div></div>`).join('');

async function ytFetch(path) {
  const res = await fetch(`https://www.googleapis.com/youtube/v3/${path}&key=${YT_KEY}`);
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message||'YouTube API error'); }
  return res.json();
}
async function claudeFetch(prompt, system='') {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:system||'You are a YouTube Shorts content strategist. Be concise, specific, and actionable.', messages:[{role:'user',content:prompt}] }),
  });
  const data = await res.json();
  return data.content?.[0]?.text || 'No response';
}

window.onload = async () => {

// ─── Dashboard ────────────────────────────────────────────────────────────────
function buildNotifications() {

  if (state.myStats) notifs.push({color:'var(--green)',text:`${MY_CHANNEL} · ${fmtNum(state.myStats.subscriberCount)} subscribers`,sub:`${fmtNum(state.myStats.viewCount)} total views · ${fmtNum(state.myStats.videoCount)} videos`});
  if (!state.competitors.length) notifs.push({color:'var(--yellow)',text:'No competitors tracked yet',sub:'Go to Competitors to add channels'});
  else notifs.push({color:'var(--blue)',text:`${state.competitors.length} competitor${state.competitors.length!==1?'s':''} tracked`,sub:state.competitors.map(c=>c.title).join(', ')});
  if (state.watchlist.length) notifs.push({color:'var(--yellow)',text:`${state.watchlist.length} video${state.watchlist.length!==1?'s':''} in your Watchlist`,sub:'Review and analyse them'});

  if (incomplete.length) notifs.push({color:'var(--red)',text:`${incomplete.length} weekly target${incomplete.length!==1?'s':''} in progress`,sub:'Head to Weekly Targets'});

      ${myStats?`<div class="stat-card"><div class="stat-label">Subscribers</div><div class="stat-value" style="color:var(--green)">${fmtNum(myStats.subscriberCount)}</div><div class="stat-sub">${MY_CHANNEL}</div></div>`:''}
    </div>
    ${myStats?`<div class="channel-banner"><div class="row" style="gap:12px;margin-bottom:14px;"><div class="pulse-dot"></div><div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:600;">${MY_CHANNEL}</div>${tag('My Channel','#34d399')}</div><div style="display:flex;gap:28px;flex-wrap:wrap;"><div><div class="stat-label">SUBSCRIBERS</div><div style="font-family:'Syne';font-size:22px;font-weight:700;color:var(--green)">${fmtNum(myStats.subscriberCount)}</div></div><div><div class="stat-label">TOTAL VIEWS</div><div style="font-family:'Syne';font-size:22px;font-weight:700;">${fmtNum(myStats.viewCount)}</div></div><div><div class="stat-label">VIDEOS</div><div style="font-family:'Syne';font-size:22px;font-weight:700;">${fmtNum(myStats.videoCount)}</div></div></div></div>`:''}
    <div class="row-between" style="margin-bottom:14px;"><div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:600;">Tracked Competitors</div><button class="btn btn-ghost btn-sm" onclick="navigate('competitors')">Manage →</button></div>
    ${!competitors.length?`<div class="empty-state">No competitors yet. <span class="empty-link" onclick="navigate('competitors')">Add one →</span></div>`:`<div class="col" style="gap:8px;">${competitors.slice(0,5).map(c=>`<div class="comp-row"><img class="comp-avatar" src="${c.thumbnail}" onerror="this.style.display='none'"><div class="comp-info"><div class="comp-name">${c.title}</div><div class="comp-handle">${c.handle}</div><div class="comp-stats"><span>👥 ${fmtNum(c.subscriberCount)}</span><span>🎬 ${fmtNum(c.videoCount)}</span></div></div><button class="btn btn-ghost btn-sm" onclick="navigate('feed')">Feed →</button></div>`).join('')}</div>`}
  `;

// ─── Competitors ──────────────────────────────────────────────────────────────
function renderCompetitors() {
  document.getElementById('page').innerHTML = `
    <div class="page-header"><div class="page-title">Competitors</div><div class="page-sub">Track and manage competitor channels</div></div>
    <div class="card card-pad" style="margin-bottom:20px;">
      <div style="font-size:13px;font-weight:500;margin-bottom:14px;">Add Competitor Channel</div>
      <div class="row"><input type="text" id="comp-input" placeholder="@SalishMatter or @JordanMatter" style="flex:1;" onkeydown="if(event.key==='Enter')addCompetitor()"><button class="btn btn-primary" id="add-comp-btn" onclick="addCompetitor()">Add Channel</button></div>

}
function renderCompList() {
  if (!state.competitors.length) return `<div class="empty-state">No competitors added yet.</div>`;
  return `<div class="col" style="gap:10px;">${state.competitors.map(c=>`<div class="comp-row fade-up"><img class="comp-avatar" src="${c.thumbnail}" onerror="this.style.display='none'"><div class="comp-info"><div class="comp-name">${c.title}</div><div class="comp-handle">${c.handle}</div><div class="comp-stats"><span>👥 ${fmtNum(c.subscriberCount)}</span><span>🎬 ${fmtNum(c.videoCount)}</span><span>👁 ${fmtNum(c.viewCount)}</span></div></div><div class="row"><button class="btn btn-ghost btn-sm" onclick="openPlaybook('${c.id}','${c.title.replace(/'/g,"\\'")}')">📖 Playbook</button><button class="btn btn-danger btn-sm" onclick="removeCompetitor('${c.id}')">Remove</button></div></div>`).join('')}</div>`;
}
async function addCompetitor() {
  const input=document.getElementById('comp-input'), errEl=document.getElementById('comp-error'), btn=document.getElementById('add-comp-btn');
  const handle=input.value.trim(); if(!handle)return;
  btn.disabled=true; btn.textContent='Adding...'; errEl.style.display='none';
  try {
    const h=handle.replace('@','');
    const data=await ytFetch(`channels?part=snippet,statistics&forHandle=${h}`);
    if(!data.items?.length) throw new Error('Channel not found.');
    const ch=data.items[0];
    const comp={id:ch.id,title:ch.snippet.title,handle:'@'+h,thumbnail:ch.snippet.thumbnails?.medium?.url||ch.snippet.thumbnails?.default?.url||'',subscriberCount:ch.statistics.subscriberCount,videoCount:ch.statistics.videoCount,viewCount:ch.statistics.viewCount};
    if(!state.competitors.find(c=>c.id===comp.id)){state.competitors.push(comp);persist();}
    input.value=''; document.getElementById('comp-list').innerHTML=renderCompList();
  } catch(e) { errEl.textContent=e.message||'Failed.'; errEl.style.display='block'; }
  btn.disabled=false; btn.textContent='Add Channel';

function removeCompetitor(id) { state.competitors=state.competitors.filter(c=>c.id!==id); persist(); document.getElementById('comp-list').innerHTML=renderCompList(); }

// ─── Video Feed ───────────────────────────────────────────────────────────────
let feedVideos = [];

function renderFeed() {
  document.getElementById('page').innerHTML = `
    <div class="row-between page-header">
      <div><div class="page-title">Video Feed</div><div class="page-sub">Hover to preview · Click to enter Shorts player</div></div>
      <div class="filter-bar">
        <select id="feed-channel"><option value="all">All Channels</option>${state.competitors.map(c=>`<option value="${c.id}">${c.title}</option>`).join('')}</select>
        <select id="feed-sort"><option value="date">Latest</option><option value="viewCount">Most Viewed</option></select>
        <button class="btn btn-primary btn-sm" onclick="loadFeed()">↻ Load</button>
      </div>
    </div>
    <div id="feed-grid">${!state.competitors.length?`<div class="empty-state">Add competitors first.</div>`:`<div class="video-grid">${skeletonCards(8)}</div>`}</div>`;
  if (state.competitors.length) loadFeed();
}

async function loadFeed() {
  const channelId=document.getElementById('feed-channel')?.value||'all';
  const sort=document.getElementById('feed-sort')?.value||'date';
  const grid=document.getElementById('feed-grid');
  if(!grid)return;
  grid.innerHTML=`<div class="video-grid">${skeletonCards(8)}</div>`;
  try {
    const channels=channelId==='all'?state.competitors:state.competitors.filter(c=>c.id===channelId);
    feedVideos=[];
    for(const ch of channels){
      const data=await ytFetch(`search?part=snippet&channelId=${ch.id}&type=video&order=${sort}&maxResults=20`);
      const ids=data.items?.map(v=>v.id.videoId).filter(Boolean).join(',');
      if(!ids)continue;
      const details=await ytFetch(`videos?part=statistics,snippet&id=${ids}`);
      feedVideos.push(...(details.items||[]));
    }
    grid.innerHTML=feedVideos.length?`<div class="video-grid">${feedVideos.map((v,i)=>videoCardHTML(v,i)).join('')}</div>`:`<div class="empty-state">No videos found.</div>`;
  } catch(e) { grid.innerHTML=`<div class="empty-state" style="color:var(--red)">Error: ${e.message}</div>`; }
}

function videoCardHTML(v, idx=0) {
  const vid=v.id?.videoId||v.id;
  const views=fmtNum(v.statistics?.viewCount), likes=fmtNum(v.statistics?.likeCount);
  const thumb=v.snippet?.thumbnails?.medium?.url||v.snippet?.thumbnails?.default?.url||'';
  const title=(v.snippet?.title||'').replace(/'/g,"&#39;").replace(/"/g,'&quot;');
  const saved=state.watchlist.some(w=>(w.id?.videoId||w.id)===vid);
  return `
    <div class="video-card">
      <div class="video-thumb" onclick="openShortsPlayer(${idx})">
        <img src="${thumb}" alt="" loading="lazy">
        <iframe class="hover-player" src="https://www.youtube.com/embed/${vid}?mute=1&autoplay=0" loading="lazy" allow="autoplay; encrypted-media"></iframe>
        <div class="video-overlay"><span class="video-date">${timeAgo(v.snippet?.publishedAt)}</span></div>
        <div class="play-btn">▶</div>
      </div>
      <div class="video-info">
        <div class="video-title">${v.snippet?.title||''}</div>
        <div class="video-meta"><span>👁 ${views}</span><span>👍 ${likes}</span><span style="margin-left:auto;font-size:10px;">${v.snippet?.channelTitle||''}</span></div>
        <div class="video-actions">
          <button class="btn btn-primary btn-sm" style="flex:1" onclick="openShortsPlayer(${idx})">▶ Watch</button>
          <button class="btn btn-ghost btn-sm" id="save-${vid}" style="color:${saved?'var(--purple-light)':'var(--text-muted)'}" onclick="toggleWatchlist(event,'${vid}')">${saved?'★':'☆'}</button>
        </div>
      </div>
    </div>`;
}

// ─── Shorts Player ────────────────────────────────────────────────────────────
let spIndex = 0;
let spVideos = [];
let spAIPanelOpen = false;

function openShortsPlayer(idx) {
  spVideos = feedVideos;
  spIndex = idx;
  spAIPanelOpen = false;
  document.getElementById('shorts-ai-panel').classList.remove('open');
  document.getElementById('shorts-player').classList.add('open');
  document.body.style.overflow = 'hidden';
  spRender();
}

function closeShortsPlayer() {
  document.getElementById('shorts-player').classList.remove('open');
  document.body.style.overflow = '';
  // Stop all iframes
  ['sp-slide-prev','sp-slide-curr','sp-slide-next'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '';
  });
}

function spRender() {
  const v = spVideos[spIndex];
  if (!v) return;
  const vid = v.id?.videoId || v.id;
  const title = v.snippet?.title || '';
  const views = fmtNum(v.statistics?.viewCount);
  const likes = fmtNum(v.statistics?.likeCount);
  const channel = v.snippet?.channelTitle || '';
  const saved = state.watchlist.some(w => (w.id?.videoId||w.id) === vid);

  document.getElementById('sp-channel').textContent = channel;
  document.getElementById('sp-title').textContent = title;
  document.getElementById('sp-stats').textContent = `👁 ${views}  ·  👍 ${likes}`;
  document.getElementById('sp-counter').textContent = `${spIndex+1} / ${spVideos.length}`;
  document.getElementById('sp-prev-btn').disabled = spIndex === 0;
  document.getElementById('sp-next-btn').disabled = spIndex === spVideos.length - 1;
  document.getElementById('sp-progress').style.width = `${((spIndex+1)/spVideos.length)*100}%`;

  const saveBtn = document.getElementById('sp-save-btn');
  saveBtn.textContent = saved ? '★' : '☆';
  saveBtn.classList.toggle('saved', saved);

  // Current slide
  const curr = document.getElementById('sp-slide-curr');
  curr.style.transform = 'translateY(0)';
  curr.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1&mute=0" style="width:100%;height:100%;border:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;

  // Preload prev
  const prev = document.getElementById('sp-slide-prev');
  prev.style.transform = 'translateY(-100%)';
  if (spIndex > 0) {
    const pv = spVideos[spIndex-1]; const pvid = pv.id?.videoId||pv.id;
    prev.innerHTML = `<iframe src="https://www.youtube.com/embed/${pvid}?autoplay=0" style="width:100%;height:100%;border:none;" allow="autoplay; encrypted-media"></iframe>`;
  } else prev.innerHTML = '';

  // Preload next
  const next = document.getElementById('sp-slide-next');
  next.style.transform = 'translateY(100%)';
  if (spIndex < spVideos.length-1) {
    const nv = spVideos[spIndex+1]; const nvid = nv.id?.videoId||nv.id;
    next.innerHTML = `<iframe src="https://www.youtube.com/embed/${nvid}?autoplay=0" style="width:100%;height:100%;border:none;" allow="autoplay; encrypted-media"></iframe>`;
  } else next.innerHTML = '';

  // Reset AI panel
  document.getElementById('sp-ai-result').innerHTML = `<div style="color:var(--text-muted);font-size:13px;">Tap a button above for AI insights on this video</div>`;
}

function spNavigate(dir) {
  const newIdx = spIndex + dir;
  if (newIdx < 0 || newIdx >= spVideos.length) return;

  const curr = document.getElementById('sp-slide-curr');
  const prev = document.getElementById('sp-slide-prev');
  const next = document.getElementById('sp-slide-next');

  if (dir === 1) {
    // Going forward — slide up
    curr.style.transition = 'transform .35s cubic-bezier(.4,0,.2,1)';
    next.style.transition = 'transform .35s cubic-bezier(.4,0,.2,1)';
    curr.style.transform = 'translateY(-100%)';
    next.style.transform = 'translateY(0)';
  } else {
    // Going back — slide down
    curr.style.transition = 'transform .35s cubic-bezier(.4,0,.2,1)';
    prev.style.transition = 'transform .35s cubic-bezier(.4,0,.2,1)';
    curr.style.transform = 'translateY(100%)';
    prev.style.transform = 'translateY(0)';
  }

  setTimeout(() => {
    // Stop current iframe
    curr.innerHTML = '';
    ['sp-slide-prev','sp-slide-curr','sp-slide-next'].forEach(id => {
      const el = document.getElementById(id);
      el.style.transition = 'none';
    });
    spIndex = newIdx;
    spRender();
  }, 350);
}

// Touch swipe support
let spTouchStart = null;
document.getElementById('sp-container').addEventListener('touchstart', e => { spTouchStart = e.touches[0].clientY; }, {passive:true});
document.getElementById('sp-container').addEventListener('touchend', e => {
  if (spTouchStart === null) return;
  const diff = spTouchStart - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 60) spNavigate(diff > 0 ? 1 : -1);
  spTouchStart = null;

        <div class="chart-wrap"><canvas id="chart-views" height="200"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">👍 Likes vs Views Ratio</div>
        <div class="chart-wrap"><canvas id="chart-engage" height="200"></canvas></div>
      </div>
    `;

    // Destroy old charts
    if (myChartViews) { myChartViews.destroy(); myChartViews = null; }
    if (myChartEngage) { myChartEngage.destroy(); myChartEngage = null; }

    const labels = myVids.map(v=>{
      const t = v.snippet?.title||'';
      return t.length > 22 ? t.slice(0,22)+'…' : t;
    });
    const viewData = myVids.map(v=>parseInt(v.statistics?.viewCount||0));
    const likeData = myVids.map(v=>parseInt(v.statistics?.likeCount||0));
    const ratioData = myVids.map(v=>{
      const views=parseInt(v.statistics?.viewCount||1);
      const likes=parseInt(v.statistics?.likeCount||0);
      return parseFloat(((likes/views)*100).toFixed(2));
    });

    const chartDefaults = {
      responsive: true,
      plugins: { legend:{display:false}, tooltip:{backgroundColor:'#13131e',titleColor:'#e8e8f5',bodyColor:'#6b6b90',borderColor:'#1c1c2e',borderWidth:1} },
      scales: {
        x: { ticks:{color:'#6b6b90',font:{size:10},maxRotation:45}, grid:{color:'#1c1c2e'} },
        y: { ticks:{color:'#6b6b90',font:{size:10}}, grid:{color:'#1c1c2e'} },
      },
    };

    myChartViews = new Chart(document.getElementById('chart-views'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: viewData,
          backgroundColor: viewData.map(v=>{
            const max=Math.max(...viewData);
            return v===max?'rgba(124,58,237,0.9)':'rgba(124,58,237,0.4)';
          }),
          borderColor: 'rgba(124,58,237,0.8)',
          borderWidth: 1, borderRadius: 5,
        }],
      },
      options: { ...chartDefaults, plugins:{...chartDefaults.plugins,tooltip:{...chartDefaults.plugins.tooltip,callbacks:{label:ctx=>`${fmtNum(ctx.raw)} views`}}} },
    });

    myChartEngage = new Chart(document.getElementById('chart-engage'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: ratioData,
          borderColor: '#34d399',
          backgroundColor: 'rgba(52,211,153,0.1)',
          borderWidth: 2, tension: 0.4, fill: true,
          pointBackgroundColor: '#34d399', pointRadius: 4,
        }],
      },
      options: { ...chartDefaults, plugins:{...chartDefaults.plugins,tooltip:{...chartDefaults.plugins.tooltip,callbacks:{label:ctx=>`${ctx.raw}% like rate`}}} },
    });

    // Performance table
    document.getElementById('ch-table').innerHTML = `
      <div class="card" style="overflow:hidden;">
        <table class="perf-table">
          <thead><tr><th>#</th><th>Video</th><th>Title</th><th>Views</th><th>Likes</th><th>Like Rate</th><th>Posted</th></tr></thead>
          <tbody>
            ${sorted.slice(0,10).map((v,i)=>{
              const views=parseInt(v.statistics?.viewCount||0);
              const likes=parseInt(v.statistics?.likeCount||0);
              const rate=views>0?((likes/views)*100).toFixed(1):'0';
              const thumb=v.snippet?.thumbnails?.default?.url||'';
              return `<tr>
                <td><div class="rank-badge">${i+1}</div></td>
                <td><img class="perf-thumb" src="${thumb}"></td>
                <td style="max-width:200px;"><div style="font-size:12px;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${v.snippet?.title||''}</div></td>
                <td style="font-family:'Syne',sans-serif;font-weight:600;color:var(--purple-light);">${fmtNum(views)}</td>
                <td>${fmtNum(likes)}</td>
                <td><span style="color:${parseFloat(rate)>3?'var(--green)':parseFloat(rate)>1?'var(--yellow)':'var(--red)'}">${rate}%</span></td>
                <td style="color:var(--text-muted);white-space:nowrap;">${timeAgo(v.snippet?.publishedAt)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;

    // Video grid
    document.getElementById('my-channel-grid').innerHTML = myVids.length
      ? `<div class="video-grid">${myVids.map((v,i)=>videoCardHTML(v,i)).join('')}</div>`
      : `<div class="empty-state">No videos found.</div>`;

  } catch(e) {
    document.getElementById('page').innerHTML += `<div class="empty-state" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

async function runNicheScan() {
  const keyword = document.getElementById('niche-keyword').value.trim();
  const days = parseInt(document.getElementById('niche-days').value) || 14;
  const btn = document.getElementById('niche-scan-btn');
  const out = document.getElementById('niche-results');
  if (!keyword) return;

  btn.disabled = true; btn.textContent = 'Scanning...';

  // Published after date
  const after = new Date(Date.now() - days * 86400000).toISOString();

  out.innerHTML = `
    <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:14px;">Scanning "${keyword}"...</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;">
      ${Array(4).fill(0).map(()=>`<div class="card card-pad"><div class="skeleton" style="height:16px;width:60%;margin-bottom:12px;"></div><div class="skeleton" style="height:12px;width:90%;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:70%;margin-bottom:8px;"></div><div class="skeleton" style="height:8px;border-radius:4px;"></div></div>`).join('')}
    </div>`;

  try {
    // Search YouTube
    const searchData = await ytFetch(`search?part=snippet&q=${encodeURIComponent(keyword)}&type=video&videoDuration=short&order=viewCount&publishedAfter=${after}&maxResults=30`);
    const items = searchData.items || [];
    if (!items.length) throw new Error('No results found for this keyword.');

    const ids = items.map(v=>v.id.videoId).filter(Boolean).join(',');
    const channelIds = [...new Set(items.map(v=>v.snippet?.channelId).filter(Boolean))].slice(0,20).join(',');

    // Fetch video stats + channel stats in parallel
    const [videoDetails, channelDetails] = await Promise.all([
      ytFetch(`videos?part=statistics,snippet&id=${ids}`),
      ytFetch(`channels?part=statistics,snippet&id=${channelIds}`),
    ]);

    const videos = videoDetails.items || [];
    const channels = channelDetails.items || [];
    const channelMap = {};
    channels.forEach(ch => { channelMap[ch.id] = ch; });

    // Compute metrics
    const totalViews = videos.reduce((a,v)=>a+parseInt(v.statistics?.viewCount||0),0);
    const avgViews = Math.round(totalViews / Math.max(1,videos.length));
    const topVideo = videos.reduce((a,b)=>parseInt(a.statistics?.viewCount||0)>parseInt(b.statistics?.viewCount||0)?a:b, videos[0]);
    const uniqueChannels = [...new Set(videos.map(v=>v.snippet?.channelId))].length;

    // Saturation score — based on avg channel size vs avg views
    const avgSubs = channels.reduce((a,c)=>a+parseInt(c.statistics?.subscriberCount||0),0) / Math.max(1,channels.length);
    const viewsToSubsRatio = avgViews / Math.max(1, avgSubs);
    let satScore, satColor, satLabel, satEmoji;
    if (viewsToSubsRatio > 10) { satScore=15; satColor='var(--green)'; satLabel='Early Opportunity'; satEmoji='🟢'; }
    else if (viewsToSubsRatio > 3) { satScore=50; satColor='var(--yellow)'; satLabel='Growing Fast — Move Now'; satEmoji='🟡'; }
    else if (viewsToSubsRatio > 1) { satScore=75; satColor='var(--yellow)'; satLabel='Competitive'; satEmoji='🟠'; }
    else { satScore=92; satColor='var(--red)'; satLabel='Saturated'; satEmoji='🔴'; }

    // Top performing videos for this niche
    const topVids = [...videos].sort((a,b)=>parseInt(b.statistics?.viewCount||0)-parseInt(a.statistics?.viewCount||0)).slice(0,5);

    // Now ask Claude to analyse
    const titlesForAI = topVids.map(v=>`"${v.snippet?.title}" — ${fmtNum(v.statistics?.viewCount)} views`).join('\n');
    const aiPromise = claudeFetch(
      `You are a YouTube niche analyst. Analyse this niche data for a Shorts creator targeting teens 12-17.\n\nKeyword: "${keyword}"\nTop performing videos:\n${titlesForAI}\nAvg views: ${fmtNum(avgViews)}\nAvg channel size: ${fmtNum(Math.round(avgSubs))} subs\nSaturation: ${satLabel}\n\nProvide:\n1. Niche Summary (2 sentences)\n2. Why it's trending right now\n3. Estimated window before saturation\n4. Best angle for Matterverse to enter this niche\n5. One hook template to use\n\nBe direct and specific.`,
      'You are a YouTube niche analyst. Be concise and actionable.'
    );

    // Render niche card
    out.innerHTML = `
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:16px;">Results for "${keyword}"</div>

      <!-- Metrics row -->
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;">
        <div class="stat-card" style="flex:1;min-width:100px;">
          <div class="stat-label">Saturation</div>
          <div style="font-size:22px;margin:6px 0;">${satEmoji}</div>
          <div style="font-size:12px;font-weight:600;color:${satColor};">${satLabel}</div>
        </div>
        <div class="stat-card" style="flex:1;min-width:100px;">
          <div class="stat-label">Avg Views</div>
          <div class="stat-value" style="color:var(--purple-light);font-size:22px;">${fmtNum(avgViews)}</div>
          <div class="stat-sub">Per video</div>
        </div>
        <div class="stat-card" style="flex:1;min-width:100px;">
          <div class="stat-label">Channels Active</div>
          <div class="stat-value" style="font-size:22px;">${uniqueChannels}</div>
          <div class="stat-sub">In last ${days} days</div>
        </div>
        <div class="stat-card" style="flex:1;min-width:100px;">
          <div class="stat-label">Avg Channel Size</div>
          <div class="stat-value" style="color:var(--yellow);font-size:22px;">${fmtNum(Math.round(avgSubs))}</div>
          <div class="stat-sub">Subscribers</div>
        </div>
      </div>

      <!-- Saturation bar -->
      <div class="card card-pad" style="margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div style="font-size:13px;font-weight:500;">Saturation Level</div>
          <div style="font-size:12px;color:${satColor};font-weight:600;">${satScore}%</div>
        </div>
        <div style="background:var(--border);border-radius:6px;height:10px;overflow:hidden;">
          <div style="height:100%;width:${satScore}%;border-radius:6px;background:${satColor};transition:width 1s ease;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--text-dim);">
          <span>🟢 Early</span><span>🟡 Growing</span><span>🔴 Saturated</span>
        </div>
      </div>

      <!-- AI Analysis -->
      <div class="insight-block" style="margin-bottom:20px;" id="niche-ai-block">
        <div class="insight-meta"><div class="pulse-dot"></div><div class="insight-label">AI Niche Analysis</div></div>
        <div id="niche-ai-text"><div class="col" style="gap:8px;">${[90,70,85,60,80].map(w=>`<div class="skeleton" style="height:13px;width:${w}%;"></div>`).join('')}</div></div>
      </div>

      <!-- Top Videos -->
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:600;margin-bottom:14px;">Top Performing Videos in This Niche</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">
        ${topVids.map((v,i)=>{
          const vid = v.id?.videoId||v.id;
          const thumb = v.snippet?.thumbnails?.medium?.url||'';
          const ch = channelMap[v.snippet?.channelId];
          const subs = ch ? fmtNum(ch.statistics?.subscriberCount) : '?';
          const views = parseInt(v.statistics?.viewCount||0);
          const chSubs = parseInt(ch?.statistics?.subscriberCount||1);
          const ratio = (views/chSubs).toFixed(1);
          const isHot = parseFloat(ratio) > 5;
          return `<div class="card card-pad" style="display:flex;gap:14px;align-items:flex-start;cursor:pointer;" onclick="openModal('${vid}','${(v.snippet?.title||'').replace(/'/g,"\\'")}','${fmtNum(v.statistics?.viewCount)}','${fmtNum(v.statistics?.likeCount)}')">
            <img src="${thumb}" style="width:90px;height:51px;object-fit:cover;border-radius:7px;flex-shrink:0;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:500;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${v.snippet?.title||''}</div>
              <div style="display:flex;gap:10px;font-size:11px;color:var(--text-muted);flex-wrap:wrap;">
                <span>👁 ${fmtNum(v.statistics?.viewCount)}</span>
                <span>👥 ${subs} subs</span>
                <span style="color:${isHot?'var(--green)':'var(--text-muted)'};">📈 ${ratio}x ratio${isHot?' 🔥':''}</span>
                <span>${timeAgo(v.snippet?.publishedAt)}</span>
              </div>
            </div>
            <button class="btn btn-primary btn-sm" style="flex-shrink:0;">Analyse</button>
          </div>`;
        }).join('')}
      </div>

      <!-- Send to Idea Vault -->
      <button class="btn btn-primary" onclick="nicheSendToIdeas('${keyword.replace(/'/g,"\\'")}')">💡 Generate Ideas from This Niche</button>
    `;

    // Resolve AI
    aiPromise.then(result => {
      const el = document.getElementById('niche-ai-text');
      if (el) el.innerHTML = `<div class="fade-up" style="font-size:13px;line-height:1.8;white-space:pre-wrap;">${result}</div>`;
    }).catch(() => {
      const el = document.getElementById('niche-ai-text');
      if (el) el.textContent = 'AI analysis failed.';
    });

  } catch(e) {
    out.innerHTML = `<div class="empty-state" style="color:var(--red)">Error: ${e.message}</div>`;
  }
  btn.disabled = false; btn.textContent = '🔍 Scan';
}

async function loadPushedChannels() {
  const btn = document.getElementById('pushed-btn');
  const out = document.getElementById('pushed-results');
  if (!btn || !out) return;
  btn.disabled = true; btn.textContent = 'Loading...';

  // Skeleton
  out.innerHTML = `<div style="display:flex;flex-direction:column;gap:10px;">${Array(5).fill(0).map(()=>`<div class="card card-pad" style="display:flex;gap:14px;align-items:center;"><div class="skeleton" style="width:46px;height:46px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:7px;"><div class="skeleton" style="height:14px;width:50%;"></div><div class="skeleton" style="height:11px;width:80%;"></div></div></div>`).join('')}</div>`;

  try {
    // Search multiple niche-adjacent keywords to find videos being pushed
    const keywords = ['family shorts','teen challenge','emotional shorts','siblings prank','school story shorts'];
    const after = new Date(Date.now() - 14 * 86400000).toISOString();
    let allVideos = [];

    for (const kw of keywords) {
      const data = await ytFetch(`search?part=snippet&q=${encodeURIComponent(kw)}&type=video&videoDuration=short&order=viewCount&publishedAfter=${after}&maxResults=10`);
      allVideos.push(...(data.items||[]));
    }

    // Deduplicate by channelId
    const seenChannels = new Set();
    const uniqueVids = allVideos.filter(v => {
      const cid = v.snippet?.channelId;
      if (seenChannels.has(cid)) return false;
      seenChannels.add(cid); return true;
    });

    // Get channel stats
    const channelIds = uniqueVids.map(v=>v.snippet?.channelId).filter(Boolean).slice(0,20).join(',');
    const videoIds = uniqueVids.map(v=>v.id?.videoId).filter(Boolean).slice(0,20).join(',');

    const [chData, vidData] = await Promise.all([
      ytFetch(`channels?part=statistics,snippet&id=${channelIds}`),
      ytFetch(`videos?part=statistics,snippet&id=${videoIds}`),
    ]);

    const channels = chData.items || [];
    const videos = vidData.items || [];
    const vidMap = {};
    videos.forEach(v => vidMap[v.id] = v);

    // Filter: small channels with high views = being pushed
    const pushed = channels
      .map(ch => {
        const vid = uniqueVids.find(v=>v.snippet?.channelId===ch.id);
        const vidId = vid?.id?.videoId;
        const vidDetails = vidId ? vidMap[vidId] : null;
        const subs = parseInt(ch.statistics?.subscriberCount||0);
        const views = parseInt(vidDetails?.statistics?.viewCount||0);
        const ratio = subs > 0 ? views/subs : 0;
        return { ch, vid, vidDetails, subs, views, ratio };
      })
      .filter(x => x.subs < 50000 && x.views > 20000 && x.ratio > 2)
      .sort((a,b) => b.ratio - a.ratio)
      .slice(0, 12);

    if (!pushed.length) {
      out.innerHTML = `<div class="empty-state">No strongly pushed small channels detected right now. Try again later or adjust your scan keywords.</div>`;
      btn.disabled = false; btn.textContent = '↻ Refresh'; return;
    }

    out.innerHTML = `<div style="display:flex;flex-direction:column;gap:10px;">
      ${pushed.map(({ch, vid, vidDetails, subs, views, ratio}) => {
        const thumb = ch.snippet?.thumbnails?.default?.url || '';
        const vidThumb = vidDetails?.snippet?.thumbnails?.medium?.url || '';
        const vidId = vid?.id?.videoId || '';
        const vidTitle = vidDetails?.snippet?.title || vid?.snippet?.title || '';
        const isHot = ratio > 10;
        const isFire = ratio > 50;
        return `<div class="card card-pad fade-up" style="display:flex;gap:14px;align-items:flex-start;">
          <img src="${thumb}" style="width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--border);flex-shrink:0;" onerror="this.style.display='none'">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">
              <div style="font-size:13px;font-weight:600;">${ch.snippet?.title||'Unknown'}</div>
              ${isFire?`<span style="font-size:10px;background:rgba(248,113,113,0.2);color:var(--red);border:1px solid rgba(248,113,113,0.3);border-radius:4px;padding:1px 6px;font-weight:600;">🔥 ON FIRE</span>`
              :isHot?`<span style="font-size:10px;background:rgba(251,191,36,0.2);color:var(--yellow);border:1px solid rgba(251,191,36,0.3);border-radius:4px;padding:1px 6px;font-weight:600;">⚡ HOT</span>`:''}
            </div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">
              👥 ${fmtNum(subs)} subs · 👁 ${fmtNum(views)} views · 📈 ${ratio.toFixed(1)}x views/subs ratio
            </div>
            ${vidTitle?`<div style="background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;display:flex;gap:10px;align-items:center;cursor:pointer;" onclick="openModal('${vidId}','${vidTitle.replace(/'/g,"\\'")}','${fmtNum(views)}','?')">
              ${vidThumb?`<img src="${vidThumb}" style="width:56px;height:32px;object-fit:cover;border-radius:4px;flex-shrink:0;">`:''}
              <div style="font-size:12px;color:var(--text);flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${vidTitle}</div>
              <span style="font-size:11px;color:var(--purple-light);flex-shrink:0;">Analyse →</span>
            </div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`;

  } catch(e) {
    out.innerHTML = `<div class="empty-state" style="color:var(--red)">Error: ${e.message}</div>`;
  }
  btn.disabled = false; btn.textContent = '↻ Refresh';
}

function nicheSendToIdeas(keyword) {
  navigate('ideas');
  setTimeout(() => {
    const input = document.getElementById('idea-topic');
    if (input) { input.value = keyword; generateIdeas(); }
  }, 300);
}
</script>
</body>
</html>
